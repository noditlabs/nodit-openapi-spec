  /{chain}/{network}/native/getNativeTransfersByAccount:
    post:
      security:
        - api_key: []
      operationId: getNativeTransfersByAccount
      summary: Get Native Transfers By Account
      description: |
        Retrieves the native token transfer history for a specific account.
      x-seo-description: Fetch all native currency transfers associated with a specific account address.
      tags:
        - Native Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arc
              - tron
            default: arc
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - testnet
              - mainnet
            default: testnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Arc
                  allOf:
                    - type: object
                      properties:
                        accountAddress:
                          $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeBalanceByAccount/post/requestBody/content/application~1json/schema/oneOf/0/properties/accountAddress"
                        relation:
                          type: string
                          description: |-
                            Parameter for filtering transactions where the queried account address is the sender or recipient.
                            - from: Filter by sender only.
                            - to: Filter by recipient only.
                            - both (default): Returns all transactions where the queried address appears in from or to.
                          enum:
                            - from
                            - to
                            - both
                          pattern: from|to|both
                          default: both
                        fromBlock:
                          type: string
                          description: |
                            Parameter specifying the starting block for the query. You can enter one of the following formats:
                            - block number: Enter block number as a decimal string.
                            - block hash: 64-character hexadecimal (including "0x").
                            - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                            Notes:
                            - This field cannot be used together with `fromDate` and `toDate`.
                            - If provided without fromBlock, results are queried from genesis block to this block.
                            - toBlock value cannot be less than fromBlock value.
                            - If fromBlock and toBlock have the same value, only that block is queried.
                            - "earliest" for toBlock is only allowed when fromBlock is "earliest".
                            - If `fromBlock` and `toBlock` are not provided, the API queries data from the latest 30 days.
                          pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                        toBlock:
                          type: string
                          description: |-
                            Parameter specifying the ending block for the query. You can enter one of the following formats:
                            - block number: Enter block number as a decimal string.
                            - block hash: 64-character hexadecimal (including "0x").
                            - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                            Notes:
                            - This field cannot be used together with `fromDate` and `toDate`.
                            - If provided without fromBlock, results are queried from genesis block to this block.
                            - toBlock value cannot be less than fromBlock value.
                            - If fromBlock and toBlock have the same value, only that block is queried.
                            - "earliest" for toBlock is only allowed when fromBlock is "earliest".
                            - If `fromBlock` and `toBlock` are not provided, the API queries data from the latest 30 days.
                          pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                        fromDate:
                          type: string
                          description: |-
                            Parameter specifying the start date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                            Notes:
                            - If provided without toDate, results are queried from this date to the latest block.
                            - fromDate value must be equal to or earlier than toDate value.
                            - If fromDate and toDate have the same value, only blocks from that date are queried.
                            - This field cannot be used together with fromBlock and toBlock.  
                            - If `fromDate` and `toDate` are not provided, the API queries data from the latest 30 days.
                          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                          example: "2025-01-01T00:00:00+00:00"
                        toDate:
                          type: string
                          description: |-
                            Parameter specifying the end date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                            Notes:
                            - If provided without fromDate, results are queried from genesis block to this date.
                            - toDate value must be equal to or later than fromDate value.
                            - If fromDate and toDate have the same value, only blocks from that date are queried.
                            - This field cannot be used together with fromBlock and toBlock.  
                            - If `fromDate` and `toDate` are not provided, the API queries data from the latest 30 days.
                          pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                          example: "2025-01-31T00:00:00+00:00"
                    - $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeHolders/post/requestBody/content/application~1json/schema/allOf/0"
                - title: Tron
                  allOf:
                    - type: object
                      properties:
                        accountAddress:
                          $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeBalanceByAccount/post/requestBody/content/application~1json/schema/oneOf/12/properties/accountAddress"
                        relation:
                          $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeTransfersByAccount/post/requestBody/content/application~1json/schema/oneOf/0/allOf/0/properties/relation"
                        fromBlock:
                          type: string
                          description: |
                            Parameter specifying the starting point for the query. You can enter block number, block hash, or block tag. Default is 0.
                            - block number: Enter as a decimal string.
                            - block hash: Enter as a 64-character hexadecimal string, excluding the 0x prefix.
                            - block tag: You can enter "earliest" for fromBlock.

                            Notes:
                            - If only fromBlock is provided without toBlock, results are queried from fromBlock to the most recent block.
                            - fromBlock's block number must be less than or equal to toBlock's block number.
                            - If toBlock and fromBlock have the same value, only that single block's results are queried.
                            - "latest" cannot be entered for fromBlock.
                          pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                          default: earliest
                          example: "80453005"
                        toBlock:
                          type: string
                          description: |-
                            Parameter specifying the ending point for the query. You can enter block number, block hash, or block tag. Default is "latest".
                            - block number: Enter as a decimal string.
                            - block hash: Enter as a 64-character hexadecimal string, excluding the 0x prefix.
                            - block tag: You can enter "latest".

                            Notes:
                            - The blockNumber for toBlock must be greater than or equal to the blockNumber for fromBlock.
                            - If toBlock and fromBlock have the same value, only that single block's results are queried.
                            - If only toBlock is provided without fromBlock, results are queried from genesis block to the time specified in toBlock.
                            - "earliest" cannot be entered for toBlock.
                          pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                          default: latest
                          example: "80453006"
                        fromDate:
                          $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeTransfersByAccount/post/requestBody/content/application~1json/schema/oneOf/0/allOf/0/properties/fromDate"
                        toDate:
                          $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeTransfersByAccount/post/requestBody/content/application~1json/schema/oneOf/0/allOf/0/properties/toDate"
                    - $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeHolders/post/requestBody/content/application~1json/schema/allOf/0"
                    - type: object
                      properties:
                        withZeroValue:
                          type: boolean
                          description: Parameter specifying whether to include results with value 0 in the response. Set to true for faster responses.
                          default: false
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                  - title: Arc
                    allOf:
                      - $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeHolders/post/responses/200/content/application~1json/schema/allOf/0"
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - from
                                - to
                                - value
                                - timestamp
                                - blockNumber
                                - transactionHash
                                - logIndex
                              properties:
                                from:
                                  type: string
                                  description: A field representing the address from which the token was transferred. Provided as a 40-character hexadecimal string prefixed with 0x.
                                to:
                                  type: string
                                  description: A field representing the address that received the token. Provided as a 40-character hexadecimal string prefixed with 0x.
                                value:
                                  type: string
                                  description: A field representing the amount of tokens transferred. Provided in decimal string format.
                                timestamp:
                                  type: integer
                                  description: A field representing when the token transfer occurred. This field is provided as a UNIX timestamp.
                                blockNumber:
                                  type: integer
                                  description: A field representing the block number where the token transfer occurred.
                                transactionHash:
                                  type: string
                                  description: A field representing the hash of the token transfer transaction. Provided as a 64-character hexadecimal string prefixed with 0x.
                                logIndex:
                                  type: integer
                                  description: A field representing the log index of the token transfer transaction. Indicates the order of events in the transaction.
                                batchIndex:
                                  type: integer
                                  description: A field representing the batch index of the token transfer transaction. This field is included only in responses for ERC1155 token transfers.
                                function:
                                  type: object
                                  description: A field representing the information of the function called in a transaction containing a Transfer. This field is included in the response only when the withFunction parameter is set to true.
                                  required:
                                    - selector
                                    - input
                                  properties:
                                    selector:
                                      type: string
                                      description: A 4-byte function selector value that identifies the called function. The function selector is the first 4 bytes of the Keccak-256 hash of the function signature. Provided as an 8-character hexadecimal string prefixed with 0x.
                                    name:
                                      type: string
                                      description: A field representing the name of the called function.
                                    signature:
                                      type: string
                                      description: "A field representing the signature of the called function. "
                                    args:
                                      type: array
                                      description: A field representing the arguments of the called function.
                                      items:
                                        type: object
                                        properties:
                                          name:
                                            type: string
                                            description: A field representing the name of the argument.
                                          type:
                                            type: string
                                            description: A field representing the type of the argument.
                                          value:
                                            type: string
                                            description: A field representing the value of the argument.
                                    input:
                                      type: string
                                      description: A field representing the input data of the function. Provided as a hexadecimal string prefixed with 0x.
                  - title: Tron
                    allOf:
                      - $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeHolders/post/responses/200/content/application~1json/schema/allOf/0"
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - from
                                - to
                                - value
                                - blockTimestamp
                                - blockNumber
                                - transactionHash
                                - transactionIndex
                              properties:
                                from:
                                  type: string
                                  description: Represents the address that initiated the transaction. This address refers to the account or smart contract that sends assets. This field has a 34-character base58 string format starting with "T".
                                to:
                                  type: string
                                  description: Represents the recipient address of the transaction. This address refers to the account or smart contract that receives assets. This field has a 34-character base58 string format starting with "T".
                                value:
                                  type: string
                                  description: Represents the amount of assets or data transferred. For TRC10 and TRC20, it indicates the amount transferred.
                                blockTimestamp:
                                  type: integer
                                  description: Indicates when the block containing the transaction was created. Recorded in UNIX timestamp format in milliseconds, used to verify when the transaction occurred.
                                blockNumber:
                                  type: integer
                                  description: Indicates the block number containing the transaction. Used to trace the transaction on the blockchain and identify the transaction's position within a specific block.
                                transactionHash:
                                  type: string
                                  description: Represents the unique hash of the transaction. Used as the transaction identifier and serves as the key to trace all data related to the transaction.
                                transactionIndex:
                                  type: integer
                                  description: Indicates the position of the transaction within the block containing it. Used to identify the order of the transaction among multiple transactions in a block.
