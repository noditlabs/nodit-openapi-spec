  /{chain}/{network}/native/getNativeTokenBalanceChangesByAccount:
    post:
      security:
        - api_key: []
      operationId: getNativeTokenBalanceChangesByAccount
      summary: Get Native Token Balance Changes By Account
      description: |
        Retrieves the native token balance change history for a specific account.
      x-seo-description: Track native token balance changes for an account over a specified time or block range.
      tags:
        - Native Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - xrpl
            default: xrpl
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: XRP Ledger
              allOf:
                - type: object
                  required:
                    - accountAddress
                  properties:
                    accountAddress:
                      $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeTokenBalanceByAccount/post/requestBody/content/application~1json/schema/oneOf/3/properties/accountAddress"
                    fromLedger:
                      type: string
                      description: |-
                        Parameter specifying the starting ledger for the query. You can enter one of the following formats:
                        - **ledger index**: Enter ledger number as a decimal string
                        - **ledger hash**: 64-character hexadecimal string (excluding 0x prefix)
                        - **ledger tag**: Enter "earliest" or "latest" (oldest or most recent ledger)

                        Notes:
                        - If provided without toLedger, results are queried from this ledger to the latest ledger.
                        - fromLedger value cannot be greater than toLedger value.
                        - If fromLedger and toLedger have the same value, only that ledger is queried.
                        - "latest" for fromLedger is only allowed when toLedger is "latest".
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    toLedger:
                      type: string
                      description: |-
                        Parameter specifying the ending ledger for the query. You can enter one of the following formats:
                        - **ledger index**: Enter ledger number as a decimal string
                        - **ledger hash**: 64-character hexadecimal string (excluding 0x prefix)
                        - **ledger tag**: Enter "earliest" or "latest" (oldest or most recent ledger)

                        Notes:
                        - If provided without fromLedger, results are queried from genesis ledger to this ledger.
                        - toLedger value cannot be less than fromLedger value.
                        - If fromLedger and toLedger have the same value, only that ledger is queried.
                        - "earliest" for toLedger is only allowed when fromLedger is "earliest".
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    fromDate:
                      type: string
                      description: |-
                        Parameter specifying the start date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                        Notes:
                        - If provided without toDate, results are queried from this date to the latest ledger.
                        - fromDate value must be equal to or earlier than toDate value.
                        - If fromDate and toDate are the same, only ledgers from that date are queried.
                        - This field cannot be used together with fromLedger and toLedger.
                      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                      default: "2025-01-01T00:00:00+00:00"
                    toDate:
                      type: string
                      description: |-
                        Parameter specifying the end date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                        Notes:
                        - If provided without fromDate, results are queried from genesis ledger creation to this date.
                        - toDate value must be equal to or later than fromDate value.
                        - If fromDate and toDate are the same, only ledgers from that date are queried.
                        - This field cannot be used together with fromLedger and toLedger.
                      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                      default: "2025-01-31T00:00:00+00:00"
                - $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeHolders/post/requestBody/content/application~1json/schema/allOf/0"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: XRP Ledger
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1native~1getNativeHolders/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          required:
                            - ledgerIndex
                            - ledgerTimestamp
                            - transactionIndex
                            - transactionHash
                            - transactionType
                            - affectedNodesIndex
                            - account
                            - currency
                            - issuer
                            - previousBalance
                            - finalBalance
                            - balanceChange
                          example:
                            ledgerIndex: 95444296
                            ledgerTimestamp: 1744608171
                            transactionIndex: 2
                            transactionHash: 8BAD7583234AC463E09D6CF160E352DFF5B008FC071DD5226A53809D89E7F409
                            transactionType: OfferCreate
                            affectedNodesIndex: 1
                            account: rf1BiGeXwwQoi8Z2ueFYTEXSwuJYfV2Jpn
                            currency: USD
                            issuer: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            previousBalance: "1000.34"
                            finalBalance: "900.12"
                            balanceChange: "-100.22"
                          properties:
                            ledgerIndex:
                              type: integer
                              description: Integer value indicating the creation order of the ledger, used to identify its position (sequence number) on the network. Required field in the Balance Changes query API.
                              example: 95444296
                            ledgerTimestamp:
                              type: integer
                              description: The ledger's close time converted to a Unix timestamp. The close time recorded in the ledger header is expressed in seconds since the Ripple Epoch (January 1, 2000 00:00 UTC), which differs from the Unix Epoch (January 1, 1970 00:00 UTC) by 946,684,800 seconds. Thus ledgerTimestamp is the recorded close time plus 946,684,800 seconds. Required field in the Transfer query API.
                              example: 1744608171
                            transactionIndex:
                              type: integer
                              description: Index indicating the processing order of the transaction within the ledger. Used to determine the order of transactions in the ledger. Required field in the Balance Changes query API.
                              example: 2
                            transactionHash:
                              type: string
                              description: A 256-bit (64-digit hexadecimal) cryptographic hash that uniquely identifies the transaction. Used for transaction data integrity and identification. Required field in the Balance Changes query API.
                              example: 8BAD7583234AC463E09D6CF160E352DFF5B008FC071DD5226A53809D89E7F409
                            transactionType:
                              type: string
                              description: String indicating the transaction type (Payment, OfferCreate, EscrowCreate, etc.). Required field in the Transfer query API.
                              example: OfferCreate
                            affectedNodesIndex:
                              type: integer
                              description: Index of the node within the AffectedNodes array.
                              example: 1
                            account:
                              type: string
                              description: Account address whose balance was changed by the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                              example: rf1BiGeXwwQoi8Z2ueFYTEXSwuJYfV2Jpn
                            currency:
                              type: string
                              description: Indicates the currency code of the asset. Typically uses ISO 4217 standard codes (e.g. "USD", "EUR"), but 160-bit custom codes may also be used. Custom codes are expressed as 40-character hexadecimal strings and are used for proprietary assets defined by specific projects or platforms (e.g. "SOLO"). For XRP, the fixed string "XRP" is used in the currency field and is returned in the same structure as IOU assets.
                              example: USD
                            issuer:
                              type: string
                              description: The address of the account that issued the asset. Even with the same currency code, asset credibility and risk may vary by issuer. Thus, the XRP Ledger uniquely identifies assets by the combination of currency code and issuer. Each asset's trustworthiness largely depends on the issuer's reputation. This field is a Base58-encoded string 25-35 characters in length, always starting with 'r'. XRP is a native asset with no issuer; in that case, issuer is shown as an empty string ("").
                              example: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            previousBalance:
                              type: string
                              description: Amount of the asset before the change. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                              example: "1000.34"
                            finalBalance:
                              type: string
                              description: Amount of the asset after the change. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                              example: "900.12"
                            balanceChange:
                              type: string
                              description: Amount changed by the transaction, including whether it increased or decreased. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                              example: "-100.22"
        "400":
          $ref: "#/components/responses/400"
        "401":
