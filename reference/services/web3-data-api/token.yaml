  /{chain}/{network}/token/getTokenBalanceChangesByAssetType:
    post:
      security:
        - api_key: []
      operationId: getTokenBalanceChangesByAssetType
      summary: Get Token Balance Changes by Asset Type
      description: |
        Retrieves token balance change history by asset type.
      x-seo-description: Retrieve token balance change history filtered by asset type.
      tags:
        - Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: Aptos
              allOf:
                - type: object
                  properties:
                    assetType:
                      $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenPairByAssetType/post/requestBody/content/application~1json/schema/properties/assetType"
                      description: |
                        Specifies the type of asset to query. The asset type must be a 64-character hexadecimal value (including "0x") in one of the following formats:

                        * Coin: A Struct-format asset ID such as "0x1::aptos_coin::AptosCoin"
                        * Fungible Asset: The Object address that owns the Token Metadata

                        ⚠️ Either assetType or linkedAssetType is required, and both parameters cannot be used at the same time.
                    linkedAssetType:
                      $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/linkedAssetType"
                      description: |
                        A common identifier used to query Coin and FA (Fungible Asset) as a single asset unit.

                        The linkedAssetType must be the Object address of a migrated FA, entered in 64-character hexadecimal format (including "0x").

                        ⚠️ Either assetType or linkedAssetType is required, and both parameters cannot be used at the same time.
                    fromBlock:
                      type: string
                      description: |
                        Parameter specifying the starting block for the query. You can enter one of the following formats:
                        - block number: Enter block number as a decimal string.
                        - block hash: 64-character hexadecimal (including "0x").
                        - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                        Notes:
                        - This field cannot be used together with `fromDate` and `toDate`.
                        - If provided without fromBlock, results are queried from genesis block to this block.
                        - toBlock value cannot be less than fromBlock value.
                        - If fromBlock and toBlock have the same value, only that block is queried.
                        - "earliest" for toBlock is only allowed when fromBlock is "earliest".
                        - If `fromBlock` and `toBlock` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: earliest
                    toBlock:
                      type: string
                      description: |-
                        Parameter specifying the ending block for the query. You can enter one of the following formats:
                        - block number: Enter block number as a decimal string.
                        - block hash: 64-character hexadecimal (including "0x").
                        - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                        Notes:
                        - This field cannot be used together with `fromDate` and `toDate`.
                        - If provided without fromBlock, results are queried from genesis block to this block.
                        - toBlock value cannot be less than fromBlock value.
                        - If fromBlock and toBlock have the same value, only that block is queried.
                        - "earliest" for toBlock is only allowed when fromBlock is "earliest".
                        - If `fromBlock` and `toBlock` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    fromDate:
                      type: string
                      description: |-
                        Parameter specifying the start date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                        Notes:
                        - If provided without toDate, results are queried from this date to the latest block.
                        - fromDate value must be equal to or earlier than toDate value.
                        - If fromDate and toDate have the same value, only blocks from that date are queried.
                        - This field cannot be used together with fromBlock and toBlock.  
                        - If `fromDate` and `toDate` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                      example: "2025-01-01T00:00:00+00:00"
                    toDate:
                      type: string
                      description: |-
                        Parameter specifying the end date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                        Notes:
                        - If provided without fromDate, results are queried from genesis block to this date.
                        - toDate value must be equal to or later than fromDate value.
                        - If fromDate and toDate have the same value, only blocks from that date are queried.
                        - This field cannot be used together with fromBlock and toBlock.  
                        - If `fromDate` and `toDate` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                      example: "2025-01-31T00:00:00+00:00"
                - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/requestBody/content/application~1json/schema/allOf/1"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: Aptos
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          required:
                            - eventIndex
                            - eventType
                            - subEventIndex
                            - accountAddress
                            - assetType
                            - linkedAssetType
                            - changeValue
                            - tokenStandard
                            - transferType
                          properties:
                            blockHeight:
                              type: integer
                              description: |
                                A field that represents the height of the block containing this balance change.
                                An integer that increments sequentially starting from the genesis block (0), used as an indicator for the blockchain length and the position of a specific block.
                              example: 160155267
                            blockTimestamp:
                              type: integer
                              description: |
                                A field that represents the block creation time.
                                Provided as a UNIX timestamp, used for block creation order and time tracking.
                                Block timestamps are used to ensure transaction order and measure inter-block creation intervals.
                              example: 1749003732416395
                            transactionHash:
                              type: string
                              description: |
                                A field that represents the hash of the transaction that caused the balance change.
                                A cryptographic hash computed from all transaction data, provided as a 64-character hexadecimal string prefixed with 0x.
                                This hash enables retrieval of full information for the transaction related to the balance change.
                              example: "0x2a41cd44491bb92d4eb17d8487f82d9b43ab6289074c1986ee055be8105707c9"
                            transactionVersion:
                              type: integer
                              description: |
                                A field that represents the version of the transaction where the balance change occurred.
                                A unique sequence ID indicating the order of the transaction on the chain, incrementing sequentially from 0.
                              example: 34872482
                            eventIndex:
                              type: integer
                              description: |
                                A field that represents the order index of the event within the transaction.
                                Indicates the order of the current event among multiple events emitted in a single transaction.
                                Starts at 0 and increments in event emission order; used to identify the order of events within the same transaction.
                              example: 0
                            eventType:
                              type: string
                              description: |
                                A field that represents the type of the event.
                                Provided as the full path (address::module::struct) of the event struct defined in the Move module.
                                Used to identify the type of operation that caused the balance change.
                              example: 0x1::coin::WithdrawEvent
                            subEventIndex:
                              type: integer
                              description: |
                                A field that represents the order of asset changes when multiple asset changes occur within a single event.
                                Identifies the order of multiple asset changes within an event sharing the same eventIndex.
                                Starts at 0 and increments sequentially; plays an important role in complex asset operations (e.g., swaps).
                              example: 0
                            accountAddress:
                              type: string
                              description: |
                                A field that represents the address of the account where the balance change occurred.
                                Provided as a 64-character hexadecimal string prefixed with 0x; identifies the account whose asset balance changed.
                                This address is either the asset owner or the destination account the asset was transferred to.
                              example: "0x948592877d14d0fde0a42e2fc15a56959f30ea35d0b87c7ee8e98e0cce756f1a"
                            assetType:
                              type: string
                              description: |
                                A field that represents the type of the asset whose balance changed.
                                Provided in one of two formats:
                                - Coin: Asset ID in Move struct format (e.g., 0x1::aptos_coin::AptosCoin)
                                - Fungible Asset: Object address that owns the metadata of the asset
                                Used to uniquely identify the type of asset.
                              example: 0x1::aptos_coin::AptosCoin
                            linkedAssetType:
                              type: string
                              description: |
                                A common identifier that links Coin and Fungible Asset when they have been migrated.
                                This field serves as a unified key that groups Coin/Fungible Asset into a single asset unit for identification and retrieval, providing the Object address where the migrated Fungible Asset's Metadata is stored.
                              example: "0xbae207659db88bea0cbead6da0ed00aac12edcdda169e591cd41c94180b46f3b"
                            changeValue:
                              type: string
                              description: |
                                A field that represents the balance change amount.
                                Provided as a string in integer form.
                                - Positive: indicates the account balance increased
                                - Negative: indicates the account balance decreased
                                The actual value must be interpreted considering decimals.
                              example: "1000000"
                            tokenStandard:
                              type: string
                              description: |
                                A field that represents the standard type of the asset.
                                - v1: Assets following the Coin standard
                                - v2: Assets following the Fungible Asset standard
                              example: coin
                            transferType:
                              type: string
                              description: |
                                A field that represents the transfer direction or action type.
                                Indicates the specific type of balance change; the following values are possible:
                                - deposit: asset deposit
                                - withdraw: asset withdrawal
                                - swap_in: deposit from swap
                                - swap_out: withdrawal from swap
                                - gas: gas fee payment
                                - refund_gas: gas fee refund
                              example: deposit
