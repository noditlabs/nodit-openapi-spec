  /{chain}/{network}/token/getTokenTransfersByAccount:
    post:
      security:
        - api_key: []
      operationId: getTokenTransfersByAccount
      summary: Get Token Transfers by Account
      description: |+
        Retrieves the list of ERC20 token transfers sent or received by a specific address. Results include token contract metadata and the transferred token amount.

      x-seo-description: Get a paginated list of ERC20 token transfers sent or received by a specific account address.
      tags:
        - Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arbitrum
              - arc
              - base
              - bnb
              - chiliz
              - ethereum
              - ethereumclassic
              - giwa
              - kaia
              - luniverse
