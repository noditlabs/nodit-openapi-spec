      security:
        - api_key: []
      operationId: getTokenTransfersByContract
      summary: Get Token Transfers by Contract
      description: |+
        Retrieves the list of ERC20 token transfers that occurred from a specific contract. Results include token contract metadata and the transferred token amount.

      x-seo-description: Retrieve the transfer history of a specific ERC20 token contract with pagination support.
      tags:
