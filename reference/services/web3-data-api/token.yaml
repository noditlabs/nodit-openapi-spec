  /{chain}/{network}/token/getTokenTransfersByCurrencyAndIssuer:
    post:
      security:
        - api_key: []
      operationId: getTokenTransfersByCurrencyAndIssuer
      summary: Get Token Transfers By Currency And Issuer
      description: |
        Retrieves token transfer history for a specific currency and issuer.
      x-seo-description: Fetch token transfers filtered by currency type and issuer address on non-EVM blockchains.
      tags:
        - Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - xrpl
            default: xrpl
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: XRP Ledger
              allOf:
                - type: object
                  required:
                    - currency
                  properties:
                    currency:
                      type: string
                      description: Parameter specifying the currency symbol to query. Can be entered as an ISO-4217 format string such as "USD" or "EUR".
                      default: USD
                    issuer:
                      type: string
                      description: Parameter specifying the issuer of the currency to query. Enter the issuer account address using a Base58-encoded string of 25-35 characters (starting with "r").
                      default: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                    fromLedger:
                      type: string
                      description: |-
                        Parameter specifying the starting ledger for the query. You can enter one of the following formats:
                        - **ledger index**: Enter ledger number as a decimal string
                        - **ledger hash**: 64-character hexadecimal string (excluding 0x prefix)
                        - **ledger tag**: Enter "earliest" or "latest" (oldest or most recent ledger)

                        Notes:
                        - If provided without toLedger, results are queried from this ledger to the latest ledger.
                        - fromLedger value cannot be greater than toLedger value.
                        - If fromLedger and toLedger have the same value, only that ledger is queried.
                        - "latest" for fromLedger is only allowed when toLedger is "latest".
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    toLedger:
                      type: string
                      description: |-
                        Parameter specifying the ending ledger for the query. You can enter one of the following formats:
                        - **ledger index**: Enter ledger number as a decimal string
                        - **ledger hash**: 64-character hexadecimal string (excluding 0x prefix)
                        - **ledger tag**: Enter "earliest" or "latest" (oldest or most recent ledger)

                        Notes:
                        - If provided without fromLedger, results are queried from genesis ledger to this ledger.
                        - toLedger value cannot be less than fromLedger value.
                        - If fromLedger and toLedger have the same value, only that ledger is queried.
                        - "earliest" for toLedger is only allowed when fromLedger is "earliest".
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    fromDate:
                      $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/fromDate"
                    toDate:
                      $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/toDate"
                - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/requestBody/content/application~1json/schema/allOf/1"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: XRP Ledger
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          required:
                            - affectedNodesIndex
                            - from
                            - to
                            - issuer
                            - currency
                            - value
                          example:
                            ledgerIndex: 95444296
                            ledgerTimestamp: 1744608171
                            transactionIndex: 0
                            transactionHash: 4770851929AD74B3EF36D818C7100564B2F3333AE60FA1B05BFAA95020D18D5B
                            transactionType: Payment
                            affectedNodesIndex: 1
                            from: rLuSZRKfW2oFVDEHab6U7tBSfnzSovzcw4
                            to: rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De
                            currency: USD
                            issuer: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            value: "100.5"
                          properties:
                            ledgerIndex:
                              type: integer
                              description: Integer value indicating the creation order of the ledger, used to identify its position (sequence number) on the network. Required field in the Transfer query API.
                              example: 95444296
                            ledgerTimestamp:
                              type: integer
                              description: The ledger's close time converted to a Unix timestamp. The close time recorded in the ledger header is expressed in seconds since the Ripple Epoch (January 1, 2000 00:00 UTC), which differs from the Unix Epoch (January 1, 1970 00:00 UTC) by 946,684,800 seconds. Thus ledgerTimestamp is the recorded close time plus 946,684,800 seconds. Required field in the Transfer query API.
                              example: 1744608171
                            transactionIndex:
                              type: integer
                              description: Index indicating the processing order of the transaction within the ledger. Required field in the Transfer query API.
                              example: 0
                            transactionHash:
                              type: string
                              description: A 256-bit (64-digit hexadecimal) cryptographic hash that uniquely identifies the transaction. Used for transaction data integrity and identification. Required field in the Transfer query API.
                              example: 4770851929AD74B3EF36D818C7100564B2F3333AE60FA1B05BFAA95020D18D5B
                            transactionType:
                              type: string
                              description: String indicating the transaction type. Distinguishes various types such as Payment, OfferCreate, EscrowCreate, and is classified by processing method. Required field in the Transfer query API.
                              example: Payment
                            affectedNodesIndex:
                              type: integer
                              description: Index of the node within the AffectedNodes array.
                              example: 1
                            from:
                              type: string
                              description: Account address that initiated the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                              example: rLuSZRKfW2oFVDEHab6U7tBSfnzSovzcw4
                            to:
                              type: string
                              description: Recipient account address of the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                              example: rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De
                            currency:
                              type: string
                              description: Indicates the currency code of the asset. Typically uses ISO 4217 standard codes (e.g. "USD", "EUR"), but 160-bit custom codes may also be used. Custom codes are expressed as 40-character hexadecimal strings and are used for proprietary assets defined by specific projects or platforms (e.g. "SOLO"). For XRP, the fixed string "XRP" is used in the currency field and is returned in the same structure as IOU assets.
                              example: USD
                            issuer:
                              type: string
                              description: The address of the account that issued the asset. Even with the same currency code, asset credibility and risk may vary by issuer. Thus, the XRP Ledger uniquely identifies assets by the combination of currency code and issuer. Each asset's trustworthiness largely depends on the issuer's reputation. This field is a Base58-encoded string 25-35 characters in length, always starting with 'r'. XRP is a native asset with no issuer; in that case, issuer is shown as an empty string ("").
                              example: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            value:
                              type: string
                              description: Returns the asset amount as a string. The amount format varies by currency. For \"XRP\", the value is in standard XRP units where 1 XRP equals 1,000,000 drops. IOU assets are expressed based on the precision defined by the issuer.
                              example: "100.5"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
