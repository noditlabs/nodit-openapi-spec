  /{chain}/{network}/token/getTokenBalanceChangesByAccount:
    post:
      security:
        - api_key: []
      operationId: getTokenBalanceChangesByAccount
      summary: Get Token Balance Changes by Account
      description: |
        Retrieves the IOU token balance change history for a specific account.
      x-seo-description: Track ERC20 token balance changes for a specific account over a block or time range.
      tags:
        - Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
              - xrpl
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Aptos
                  allOf:
                    - type: object
                      required:
                        - accountAddress
                      properties:
                        accountAddress:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokensOwnedByAccount/post/requestBody/content/application~1json/schema/oneOf/13/allOf/0/properties/accountAddress"
                        assetTypes:
                          type: array
                          description: |
                            Specifies the type of asset to query. The asset type must be a 64-character hexadecimal value (including "0x") in one of the following formats:

                            * Coin: A Struct-format asset ID such as "0x1::aptos_coin::AptosCoin"
                            * Fungible Asset: The Object address that owns the Token Metadata

                            ⚠️ assetTypes and linkedAssetTypes cannot be used at the same time.
                          items:
                            $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenPairByAssetType/post/requestBody/content/application~1json/schema/properties/assetType"
                        linkedAssetTypes:
                          type: array
                          description: |
                            A common identifier used to query Coin and FA (Fungible Asset) as a single asset unit.

                            The linkedAssetType must be the Object address of a migrated FA, entered in 64-character hexadecimal format (including "0x").

                            ⚠️ assetTypes and linkedAssetTypes cannot be used at the same time.
                          items:
                            $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/linkedAssetType"
                        fromBlock:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/fromBlock"
                        toBlock:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/toBlock"
                        fromDate:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/fromDate"
                        toDate:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/toDate"
                    - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/requestBody/content/application~1json/schema/allOf/1"
                - title: XRP Ledger
                  allOf:
                    - type: object
                      required:
                        - accountAddress
                      properties:
                        accountAddress:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenTransfersByAccount/post/requestBody/content/application~1json/schema/oneOf/13/allOf/0/properties/accountAddress"
                        currency:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenTransfersByCurrencyAndIssuer/post/requestBody/content/application~1json/schema/allOf/0/properties/currency"
                        issuer:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenTransfersByCurrencyAndIssuer/post/requestBody/content/application~1json/schema/allOf/0/properties/issuer"
                        fromLedger:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenTransfersByCurrencyAndIssuer/post/requestBody/content/application~1json/schema/allOf/0/properties/fromLedger"
                        toLedger:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenTransfersByCurrencyAndIssuer/post/requestBody/content/application~1json/schema/allOf/0/properties/toLedger"
                        fromDate:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/fromDate"
                        toDate:
                          $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/requestBody/content/application~1json/schema/allOf/0/properties/toDate"
                    - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/requestBody/content/application~1json/schema/allOf/1"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                  - title: Aptos
                    allOf:
                      - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/responses/200/content/application~1json/schema/allOf/0"
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenBalanceChangesByAssetType/post/responses/200/content/application~1json/schema/allOf/1/properties/items/items"
                  - title: XRP Ledger
                    allOf:
                      - $ref: "#/paths/~1{chain}~1{network}~1token~1getTokenAccountsByAssetType/post/responses/200/content/application~1json/schema/allOf/0"
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - ledgerIndex
                                - ledgerTimestamp
                                - transactionIndex
                                - transactionHash
                                - transactionType
                                - affectedNodesIndex
                                - account
                                - currency
                                - issuer
                                - previousBalance
                                - finalBalance
                                - balanceChange
                              example:
                                ledgerIndex: 95444296
                                ledgerTimestamp: 1744608171
                                transactionIndex: 2
                                transactionHash: 8BAD7583234AC463E09D6CF160E352DFF5B008FC071DD5226A53809D89E7F409
                                transactionType: OfferCreate
                                affectedNodesIndex: 1
                                account: rf1BiGeXwwQoi8Z2ueFYTEXSwuJYfV2Jpn
                                currency: USD
                                issuer: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                                previousBalance: "1000.34"
                                finalBalance: "900.12"
                                balanceChange: "-100.22"
                              properties:
                                ledgerIndex:
                                  type: integer
                                  description: Integer value indicating the creation order of the ledger, used to identify its position (sequence number) on the network. Required field in the Balance Changes query API.
                                  example: 95444296
                                ledgerTimestamp:
                                  type: integer
                                  description: The ledger's close time converted to a Unix timestamp. The close time recorded in the ledger header is expressed in seconds since the Ripple Epoch (January 1, 2000 00:00 UTC), which differs from the Unix Epoch (January 1, 1970 00:00 UTC) by 946,684,800 seconds. Thus ledgerTimestamp is the recorded close time plus 946,684,800 seconds. Required field in the Transfer query API.
                                  example: 1744608171
                                transactionIndex:
                                  type: integer
                                  description: Index indicating the processing order of the transaction within the ledger. Used to determine the order of transactions in the ledger. Required field in the Balance Changes query API.
                                  example: 2
                                transactionHash:
                                  type: string
                                  description: A 256-bit (64-digit hexadecimal) cryptographic hash that uniquely identifies the transaction. Used for transaction data integrity and identification. Required field in the Balance Changes query API.
                                  example: 8BAD7583234AC463E09D6CF160E352DFF5B008FC071DD5226A53809D89E7F409
                                transactionType:
                                  type: string
                                  description: String indicating the transaction type (Payment, OfferCreate, EscrowCreate, etc.). Required field in the Transfer query API.
                                  example: OfferCreate
                                affectedNodesIndex:
                                  type: integer
                                  description: Index of the node within the AffectedNodes array.
                                  example: 1
                                account:
                                  type: string
                                  description: Account address whose balance was changed by the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                                  example: rf1BiGeXwwQoi8Z2ueFYTEXSwuJYfV2Jpn
                                currency:
                                  type: string
                                  description: Indicates the currency code of the asset. Typically uses ISO 4217 standard codes (e.g. "USD", "EUR"), but 160-bit custom codes may also be used. Custom codes are expressed as 40-character hexadecimal strings and are used for proprietary assets defined by specific projects or platforms (e.g. "SOLO"). For XRP, the fixed string "XRP" is used in the currency field and is returned in the same structure as IOU assets.
                                  example: USD
                                issuer:
                                  type: string
                                  description: The address of the account that issued the asset. Even with the same currency code, asset credibility and risk may vary by issuer. Thus, the XRP Ledger uniquely identifies assets by the combination of currency code and issuer. Each asset's trustworthiness largely depends on the issuer's reputation. This field is a Base58-encoded string 25-35 characters in length, always starting with 'r'. XRP is a native asset with no issuer; in that case, issuer is shown as an empty string ("").
                                  example: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                                previousBalance:
                                  type: string
                                  description: Amount of the asset before the change. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                                  example: "1000.34"
                                finalBalance:
                                  type: string
                                  description: Amount of the asset after the change. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                                  example: "900.12"
                                balanceChange:
                                  type: string
                                  description: Amount changed by the transaction, including whether it increased or decreased. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                                  example: "-100.22"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
