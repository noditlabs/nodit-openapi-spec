  /{chain}/{network}/token/getTokenPairByAssetType:
    post:
      security:
        - api_key: []
      operationId: getTokenPairByAssetType
      summary: Get Token Pair by Asset Type
      description: |
        Retrieves token pair information for a specific asset type.
      x-seo-description: Retrieve token pair information for a specific asset type.
      tags:
        - Token API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: Aptos
              type: object
              required:
                - assetType
              properties:
                assetType:
                  type: string
                  description: |-
                    Parameter specifying the asset type to query.
                    The asset type must be entered as a 64-character hexadecimal string (including "0x") using one of the following formats:

                    - Coin: Asset ID in Struct format such as "0x1::aptos_coin::AptosCoin"
                    - Fungible Asset: Object address that owns the Token Metadata
                  pattern: ^0x[0-9a-fA-F]{1,64}::[a-z][a-zA-Z0-9_]*::[A-Z][a-zA-Z0-9_]*$|^0[xX][0-9a-fA-F]{64}
                  example: 0x1::aptos_coin::AptosCoin
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: Aptos
                type: object
                required:
                  - coinAssetType
                  - fungibleAssetType
                  - linkedAssetType
                properties:
                  coinAssetType:
                    type: string
                    description: |
                      A field that represents the type of the asset belonging to the Coin standard.
                      The Coin standard is provided in 'moduleAddress::moduleName::structName' format.
                    example: 0x1::aptos_coin::AptosCoin
                  fungibleAssetType:
                    type: string
                    description: |
                      A field that represents the type of the asset belonging to the Fungible Asset standard.
                      The Fungible Asset standard is provided as a 64-character hexadecimal string prefixed with 0x; the Object address that owns the metadata of the asset is provided.
                    example: "0xbae207659db88bea0cbead6da0ed00aac12edcdda169e591cd41c94180b46f3b"
                  linkedAssetType:
                    type: string
                    description: |
                      A common identifier that links Coin and Fungible Asset when they have been migrated.
                      This field serves as a unified key that groups Coin/Fungible Asset into a single asset unit for identification and retrieval, providing the Object address where the migrated Fungible Asset's Metadata is stored.
                    example: "0xbae207659db88bea0cbead6da0ed00aac12edcdda169e591cd41c94180b46f3b"
        "400":
          $ref: "#/components/responses/400"
