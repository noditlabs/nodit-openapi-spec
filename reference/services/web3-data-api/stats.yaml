  /{chain}/{network}/stats/getDailyTransactionsStats:
    post:
      security:
        - api_key: []
      operationId: getDailyTransactionsStats
      summary: Get Daily Transactions Stats
      description: |+
        Retrieves the daily transaction volume within the specified range.

        > 📘 When is data reflected?
        >
        > In the current daily statistics API, a 'day' is based on UTC, and each day's data is aggregated from UTC 00:00:00 to before UTC 24:00:00 of that day. For daily statistics, the previous day's statistics may be delayed until 00:30:00 the next morning, so this should be considered when querying the latest data.


        > 🚧 Check the network when using!
        >
        > This API is only supported on Ethereum Mainnet and TheBalance Mainnet. It cannot be used on other networks. Please verify the network when using.

      x-seo-description: Get daily transaction statistics for the entire blockchain network over a specified date range.
      tags:
        - Statistics API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - ethereum
              - luniverse
            default: ethereum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
              - hoodi
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Ethereum
                  type: object
                  required:
                    - startDate
                    - endDate
                  properties:
                    startDate:
                      type: string
                      description: Parameter specifying the start date for the query. Data can be queried for up to 100 days from start to end date. Supports YYYY-MM-DD format.
                      pattern: ^[0-9]{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
                      example: "2026-01-01"
                    endDate:
                      type: string
                      description: Parameter specifying the end date for the query. Data can be queried for up to 100 days from start to end date. Supports YYYY-MM-DD format.
                      pattern: ^[0-9]{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
                      example: "2026-01-01"
                - title: Luniverse
                  type: object
                  required:
                    - startDate
                    - endDate
                  properties:
                    startDate:
                      type: string
                      description: Parameter specifying the start date for the query. Data can be queried for up to 100 days from start to end date. Supports YYYY-MM-DD format.
                      pattern: ^[0-9]{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
                      example: "2026-01-01"
                    endDate:
                      type: string
                      description: Parameter specifying the end date for the query. Data can be queried for up to 100 days from start to end date. Supports YYYY-MM-DD format.
                      pattern: ^[0-9]{4}-(0[1-9]|1[012])-(0[1-9]|[12][0-9]|3[01])$
                      example: "2026-01-01"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                  - title: Ethereum
                    allOf:
                      - type: object
                        required:
                          - items
                        properties:
                          count:
                            type: integer
                            description: Field representing the total count of requested data. This field is only included in the response when true is set for the withCount parameter.
                          items:
                            type: array
                            description: Field representing the list of queried data.
                      - type: object
                        properties:
                          items:
                            type: array
                            items:
                              type: object
                              required:
                                - date
                                - count
                              properties:
                                date:
                                  type: string
                                  description: Field representing the date. Provided in YYYY-MM-DD format. (e.g., 2021-01-01)
                                count:
                                  type: integer
                                  description: Field representing the number of transactions per date.
                  - title: Luniverse
                    allOf:
