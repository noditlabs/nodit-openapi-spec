  /{chain}/{network}/blockchain/searchEvents:
    post:
      security:
        - api_key: []
      operationId: searchEvents
      summary: Search Events
      description: |+
        Searches for specific events within a specified range.


        > 🚧 Getting a 429 error? Check your subscription plan!
        > A 429 error may occur when the throughput limit of your subscribed plan is exceeded.
        > For example, the Starter plan has a limit of 300 CU per second, so calling an API that consumes 350 CU while on the Starter plan may result in a 429 error.
        > Check the CU consumption of the API you are using on the Compute Unit Costs page, and consider upgrading to a higher plan if you need more throughput!
        > 👉 [Go to Compute Unit Costs page](/guides/compute-unit)

      x-seo-description: Search for on-chain contract events by topic, address, and block range with pagination support.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arbitrum
              - arc
              - base
              - bnb
              - chiliz
              - ethereum
              - ethereumclassic
              - giwa
              - kaia
              - luniverse
              - optimism
              - polygon
            default: arbitrum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
              - testnet
              - hoodi
              - kairos
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Arbitrum
                  allOf:
                    - type: object
                      required:
                        - contractAddress
                        - eventNames
                        - abi
                      properties:
                        contractAddress:
                          type: string
                          description: Parameter specifying the contract address to query. Can be entered as a 40-character hexadecimal string starting with 0x.
                          pattern: ^0[xX][0-9a-fA-F]{40}$
                        eventNames:
                          type: array
                          items:
                            type: string
                            description: Parameter specifying the name of the event to query.
                        abi:
                          type: string
                          format: json
                          description: Parameter specifying the ABI of the contract to query. Can be entered as a JSON-formatted ABI string.
                        fromBlock:
                          type: string
                          description: |
                            Parameter specifying the starting block for the query. You can enter one of the following formats:
                            - block number: Enter block number as a decimal string.
                            - block hash: 64-character hexadecimal (including "0x").
                            - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                            Notes:
                            - This field cannot be used together with `fromDate` and `toDate`.
                            - If provided without fromBlock, results are queried from genesis block to this block.
                            - toBlock value cannot be less than fromBlock value.
