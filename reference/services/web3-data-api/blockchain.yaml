      security:
        - api_key: []
      operationId: getTransactionByHash
      summary: Get Transaction By Hash
      description: |
        Retrieves information about a specific transaction.
      x-seo-description: Fetch detailed transaction data including status, gas, and logs by its transaction hash.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
              - arbitrum
              - arc
              - base
              - bnb
              - chiliz
              - ethereum
              - ethereumclassic
              - giwa
              - kaia
              - luniverse
              - optimism
              - polygon
              - xrpl
            default: aptos
