                            account: rf1BiGeXwwQoi8Z2ueFYTEXSwuJYfV2Jpn
                            currency: USD
                            issuer: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            previousBalance: "1000.34"
                            finalBalance: "900.12"
                            balanceChange: "-100.22"
                          properties:
                            affectedNodesIndex:
                              type: integer
                              description: Index of the node within the AffectedNodes array.
                              example: 1
                            account:
                              type: string
                              description: Account address whose balance was changed by the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                              example: rf1BiGeXwwQoi8Z2ueFYTEXSwuJYfV2Jpn
                            currency:
                              type: string
                              description: Indicates the currency code of the asset. Typically uses ISO 4217 standard codes (e.g. "USD", "EUR"), but 160-bit custom codes may also be used. Custom codes are expressed as 40-character hexadecimal strings and are used for proprietary assets defined by specific projects or platforms (e.g. "SOLO"). For XRP, the fixed string "XRP" is used in the currency field and is returned in the same structure as IOU assets.
                              example: USD
                            issuer:
                              type: string
                              description: The address of the account that issued the asset. Even with the same currency code, asset credibility and risk may vary by issuer. Thus, the XRP Ledger uniquely identifies assets by the combination of currency code and issuer. Each asset's trustworthiness largely depends on the issuer's reputation. This field is a Base58-encoded string 25-35 characters in length, always starting with 'r'. XRP is a native asset with no issuer; in that case, issuer is shown as an empty string ("").
                              example: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            previousBalance:
                              type: string
                              description: Amount of the asset before the change. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                              example: "1000.34"
                            finalBalance:
                              type: string
                              description: Amount of the asset after the change. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                              example: "900.12"
                            balanceChange:
                              type: string
                              description: Amount changed by the transaction, including whether it increased or decreased. For XRP, expressed in XRP units where 1 XRP equals 1,000,000 drops.
                              example: "-100.22"
                        tokenTransfers:
                          type: object
                          required:
                            - affectedNodesIndex
                            - from
                            - to
                            - issuer
                            - currency
                            - value
                          example:
                            ledgerIndex: 95444296
                            ledgerTimestamp: 1744608171
                            transactionIndex: 0
                            transactionHash: 4770851929AD74B3EF36D818C7100564B2F3333AE60FA1B05BFAA95020D18D5B
                            transactionType: Payment
                            affectedNodesIndex: 1
                            from: rLuSZRKfW2oFVDEHab6U7tBSfnzSovzcw4
                            to: rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De
                            currency: USD
                            issuer: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            value: "100.5"
                          properties:
                            ledgerIndex:
                              type: integer
                              description: Integer value indicating the creation order of the ledger, used to identify its position (sequence number) on the network. Required field in the Transfer query API.
                              example: 95444296
                            ledgerTimestamp:
                              type: integer
                              description: The ledger's close time converted to a Unix timestamp. The close time recorded in the ledger header is expressed in seconds since the Ripple Epoch (January 1, 2000 00:00 UTC), which differs from the Unix Epoch (January 1, 1970 00:00 UTC) by 946,684,800 seconds. Thus ledgerTimestamp is the recorded close time plus 946,684,800 seconds. Required field in the Transfer query API.
                              example: 1744608171
                            transactionIndex:
                              type: integer
                              description: Index indicating the processing order of the transaction within the ledger. Required field in the Transfer query API.
                              example: 0
                            transactionHash:
                              type: string
                              description: A 256-bit (64-digit hexadecimal) cryptographic hash that uniquely identifies the transaction. Used for transaction data integrity and identification. Required field in the Transfer query API.
                              example: 4770851929AD74B3EF36D818C7100564B2F3333AE60FA1B05BFAA95020D18D5B
                            transactionType:
                              type: string
                              description: String indicating the transaction type. Distinguishes various types such as Payment, OfferCreate, EscrowCreate, and is classified by processing method. Required field in the Transfer query API.
                              example: Payment
                            affectedNodesIndex:
                              type: integer
                              description: Index of the node within the AffectedNodes array.
                              example: 1
                            from:
                              type: string
                              description: Account address that initiated the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                              example: rLuSZRKfW2oFVDEHab6U7tBSfnzSovzcw4
                            to:
                              type: string
                              description: Recipient account address of the transaction. The account address is a Base58-encoded string 25-35 characters in length, starting with 'r'.
                              example: rMxCKbEDwqr76QuheSUMdEGf4B9xJ8m5De
                            currency:
                              type: string
                              description: Indicates the currency code of the asset. Typically uses ISO 4217 standard codes (e.g. "USD", "EUR"), but 160-bit custom codes may also be used. Custom codes are expressed as 40-character hexadecimal strings and are used for proprietary assets defined by specific projects or platforms (e.g. "SOLO"). For XRP, the fixed string "XRP" is used in the currency field and is returned in the same structure as IOU assets.
                              example: USD
                            issuer:
                              type: string
                              description: The address of the account that issued the asset. Even with the same currency code, asset credibility and risk may vary by issuer. Thus, the XRP Ledger uniquely identifies assets by the combination of currency code and issuer. Each asset's trustworthiness largely depends on the issuer's reputation. This field is a Base58-encoded string 25-35 characters in length, always starting with 'r'. XRP is a native asset with no issuer; in that case, issuer is shown as an empty string ("").
                              example: rhub8VRN55s94qWKDv6jmDy1pUykJzF3wq
                            value:
                              type: string
                              description: Returns the asset amount as a string. The amount format varies by currency. For \"XRP\", the value is in standard XRP units where 1 XRP equals 1,000,000 drops. IOU assets are expressed based on the precision defined by the issuer.
                              example: "100.5"
                        balanceOutAccounts:
                          type: array
                          description: List of account addresses whose final net balance change is less than zero (decreased) after summing all sends and receives in the transaction. Reflects both XRP and IOU token balance changes.
                          items:
                            type: string
                            description: Account address with a confirmed balance decrease
                        balanceInAccounts:
                          type: array
                          description: List of account addresses whose final net balance change is greater than zero (increased) after summing all sends and receives in the transaction. Reflects both XRP and IOU token balance changes.
                          items:
                            type: string
                            description: Account address with a confirmed balance increase
                        balanceChangedTokens:
                          type: array
                          description: List of token identifiers with non-zero final net balance change when summing the entire transaction. Each item follows the 'currency-issuer' format.
                          items:
                            type: string
                            description: Token identifier in 'currency-issuer' format
        "400":
