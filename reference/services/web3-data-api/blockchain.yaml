  /{chain}/{network}/blockchain/getLedgerByHashOrIndex:
    post:
      security:
        - api_key: []
      operationId: getLedgerByHashOrIndex
      summary: Get Ledger By Hash Or Index
      description: |
        Returns information about a Ledger queried by Ledger hash or index.
      x-seo-description: Retrieve detailed ledger data by its hash or ledger index, including transaction summaries.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - xrpl
            default: xrpl
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: XRP Ledger
              type: object
              required:
                - ledger
              properties:
                ledger:
                  type: string
                  description: |
                    Parameter specifying the ledger to query. You can enter one of the following formats:
                    - ledger index: Ledger number as a decimal string
                    - ledger hash: 64-character hexadecimal string (excluding 0x prefix)
                    - ledger tag: "earliest" or "latest" (oldest or most recent ledger)
                  pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                  default: latest
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: XRP Ledger
                $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getLedgersWithinRange/post/responses/200/content/application~1json/schema/allOf/1/properties/items/items"
