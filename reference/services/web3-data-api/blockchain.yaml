                              scriptPubKey:
                                hex: 21025ac17459519db3146065c5a1738cd45315c38951e978d792492a6633c9cd6e75ac
                                asm: 025ac17459519db3146065c5a1738cd45315c38951e978d792492a6633c9cd6e75 OP_CHECKSIG
                                type: pubkey
                            properties:
                              index:
                                type: integer
                                description: Indicates the index of the Vout (output) within the containing transaction.
                                example: 0
                              address:
                                type: string
                                description: Represents the recipient address that will receive the Bitcoin from the Vout (output).
                                example: D5Vz9PwaMdPfFCxXPCbBt84s3ZJQ5wd2Gw
                              value:
                                type: string
                                description: Represents the amount of Bitcoin transferred in the Vout (output) (in BTC units).
                                example: "0.00016400"
                              scriptPubKey:
                                type: object
                                required:
                                  - hex
                                  - asm
                                  - type
                                description: Script of the Vout (output); defines the conditions (lock script) required to spend the Bitcoin.
                                properties:
                                  hex:
                                    type: string
                                    description: Script of the Vout (output) in hexadecimal format.
                                    example: 21025ac17459519db3146065c5a1738cd45315c38951e978d792492a6633c9cd6e75ac
                                  asm:
                                    type: string
                                    description: Script of the Vout (output) in assembly format.
                                    example: 025ac17459519db3146065c5a1738cd45315c38951e978d792492a6633c9cd6e75 OP_CHECKSIG
                                  type:
                                    type: string
                                    description: Indicates the script type of the Vout (output) (e.g., pubkey, p2sh, p2pkh).
                                    example: pubkey
