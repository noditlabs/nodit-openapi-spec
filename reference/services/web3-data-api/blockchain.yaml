openapi: 3.1.0
info:
  title: Web3 Data API
  version: 1.0.0
servers:
  - url: https://web3.nodit.io/v1
    description: Web3 Data API
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - MISSING_REQUIRED_PARAMETER
                  - INVALID_PARAMETER
                  - WRONG_RANGE_PARAMETER
                  - DEPRECATED_OPERATION
                description: Code to identify the cause of the bad request
              message:
                type: string
                description: Detailed message including the name, value, etc. of the invalid parameter
            required:
              - code
              - message
          examples:
            MISSING_REQUIRED_PARAMETER:
              summary: When a required parameter is missing
              value:
                code: MISSING_REQUIRED_PARAMETER
                message: "Missing required parameter: { PARAMETER_NAME }"
            INVALID_PARAMETER:
              summary: When an invalid value is provided for a parameter
              value:
                code: INVALID_PARAMETER
                message: "Invalid parameter: { PARAMETER1_NAME = PARAMETER1_VALUE }"
            WRONG_RANGE_PARAMETER:
              summary: When a value outside the query range is provided
              value:
                code: WRONG_RANGE_PARAMETER
                message: "Wrong range parameter: { PARAMETER_NAME }"
            DEPRECATED_OPERATION:
              summary: When a deprecated API is requested
              value:
                code: DEPRECATED_OPERATION
                message: This operation has been deprecated
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - NO_AUTHENTICATION_FOUND
                  - AUTHENTICATION_FAILED
                description: Code to identify the cause of authentication failure
              message:
                type: string
                description: Detailed message including the cause of authentication failure
            required:
              - code
              - message
          examples:
            NO_AUTHENTICATION_FOUND:
              summary: When authentication credentials are not included
              value:
                code: NO_AUTHENTICATION_FOUND
                message: No authentication found
            AUTHENTICATION_FAILED:
              summary: When authentication credentials are mismatched or invalid
              value:
                code: AUTHENTICATION_FAILED
                message: Authentication failed
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - PERMISSION_DENIED
                description: Code indicating permission denied
              message:
                type: string
                description: Detailed message including information about the denied resource
            required:
              - code
              - message
          examples:
            PERMISSION_DENIED:
              summary: When accessing an unauthorized resource
              value:
                code: PERMISSION_DENIED
                message: Permission denied
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - WRONG_ENDPOINT
                  - NOT_SUPPORTED_CHAIN
                  - RESOURCE_NOT_FOUND
                description: Code to identify the cause of the resource not found
              message:
                type: string
                description: Detailed message including the name, value, etc. of the resource not found
            required:
              - code
              - message
          examples:
            WRONG_ENDPOINT:
              summary: When requesting a non-existent API path
              value:
                code: WRONG_ENDPOINT
                message: Wrong endpoint
            NOT_SUPPORTED_CHAIN:
              summary: When requesting an unsupported chain
              value:
                code: NOT_SUPPORTED_CHAIN
                message: Not supported chain
            RESOURCE_NOT_FOUND:
              summary: When requesting a resource that does not exist on the server
              value:
                code: RESOURCE_NOT_FOUND
                message: "Resource not found: { RESOURCE_NAME = RESOURCE_VALUE }"
    "405":
      description: Method Not Allowed
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - METHOD_NOT_ALLOWED
                description: Code indicating a disallowed HTTP method
              message:
                type: string
                description: Detailed message about the disallowed HTTP method
            required:
              - code
              - message
          examples:
            METHOD_NOT_ALLOWED:
              summary: When requesting with an unsupported HTTP method
              value:
                code: METHOD_NOT_ALLOWED
                message: Method not allowed
    "408":
      description: Request Timeout
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - TIMEOUT
                description: Code indicating request timeout
              message:
                type: string
                description: Detailed message including the cause of the timeout
            required:
              - code
              - message
          examples:
            TIMEOUT:
              summary: When processing is not completed within the specified time
              value:
                code: TIMEOUT
                message: Request timeout
    "409":
      description: Conflict
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - RESOURCE_ALREADY_EXISTS
                  - REJECTED
                description: Code to identify the cause of the request conflict
              message:
                type: string
                description: Detailed message including information about the conflicting resource
            required:
              - code
              - message
          examples:
            RESOURCE_ALREADY_EXISTS:
              summary: When attempting to create a resource that already exists
              value:
                code: RESOURCE_ALREADY_EXISTS
                message: Resource already exists
            REJECTED:
              summary: When the request is rejected by the server
              value:
                code: REJECTED
                message: Request rejected
    "413":
      description: Payload Too Large
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - CONTENTS_TOO_LARGE
                description: Code indicating payload size exceeded
              message:
                type: string
                description: Detailed message including the maximum allowed payload size
            required:
              - code
              - message
          examples:
            CONTENTS_TOO_LARGE:
              summary: When the payload exceeds the server's maximum limit
              value:
                code: CONTENTS_TOO_LARGE
                message: Contents too large
    "414":
      description: URI Too Long
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - TOO_LONG_URI
                description: Code indicating URI length exceeded
              message:
                type: string
                description: Detailed message including the maximum allowed URI length
            required:
              - code
              - message
          examples:
            TOO_LONG_URI:
              summary: When the request URI exceeds the server's maximum length
              value:
                code: TOO_LONG_URI
                message: URI too long
    "429":
      description: Too Many Requests
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - TOO_MANY_REQUESTS
                  - EXCEEDED_QUOTA_LIMIT
                description: Code identifying the cause of the request limit exceeded
              message:
                type: string
                description: Detailed message including the exceeded limit type and allowed threshold
            required:
              - code
              - message
          examples:
            TOO_MANY_REQUESTS:
              summary: When the rate limit is exceeded
              value:
                code: TOO_MANY_REQUESTS
                message: Too many requests
            EXCEEDED_QUOTA_LIMIT:
              summary: When the quota limit is exceeded
              value:
                code: EXCEEDED_QUOTA_LIMIT
                message: Exceeded quota limit
    "500":
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - INTERNAL_SERVER_ERROR
                  - INTERRUPTED
                description: Code to identify the cause of the internal server error
              message:
                type: string
                description: Detailed message including the cause of the server error
            required:
              - code
              - message
          examples:
            INTERNAL_SERVER_ERROR:
              summary: When an internal server error occurs
              value:
                code: INTERNAL_SERVER_ERROR
                message: Internal server error
            INTERRUPTED:
              summary: When processing fails temporarily due to server load
              value:
                code: INTERRUPTED
                message: Request interrupted
    "503":
      description: Service Unavailable
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                  - UNAVAILABLE
                description: Code indicating service unavailability
              message:
                type: string
                description: Detailed message including the cause of the service outage
            required:
              - code
              - message
          examples:
            UNAVAILABLE:
              summary: When the service is unavailable due to infrastructure downtime or upgrade
              value:
                code: UNAVAILABLE
                message: Service unavailable
paths:
  /{chain}/{network}/blockchain/getBlockByHashOrNumber:
    post:
      security:
        - api_key: []
      operationId: getBlockByHashOrNumber
      summary: Get Block by Hash or Number
      description: |+
        Returns specific information about a block queried by block hash or block number.

      x-seo-description: Retrieve full block data by its hash or block number, including transactions and metadata.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
              - arbitrum
              - arc
              - base
              - bnb
              - chiliz
              - ethereum
              - ethereumclassic
              - giwa
              - kaia
              - luniverse
              - optimism
              - polygon
              - bitcoin
              - bitcoincash
              - dogecoin
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
              - sepolia
              - hoodi
              - kairos
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Aptos
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Arbitrum
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Arc
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Base
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: BNB Smart Chain
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Chiliz
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Ethereum
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Ethereum Classic
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Giwa
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Kaia
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                        For Kaia, entering "earliest" queries the block at the Kaia hardfork point.
                        - Mainnet: 162,900,480 (Aug 29, 2024 11:08:01 UTC+9)
                        - Kairos(Testnet): 156,660,000 (June 13, 2024 10:15:19 UTC+9)

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Luniverse
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Optimism
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Polygon
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |+
                        Parameter specifying the block to query. The default value is latest. You can input block number (decimal string), block hash (64-character hexadecimal string starting with 0x), or block tag (earliest, latest). "earliest" refers to the first block, "latest" refers to the most recent block.

                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Bitcoin
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |-
                        Parameter specifying the point in time for balance query. You can enter one of the following formats:
                        - block hash: 64-character hexadecimal string (256-bit). Queries based on the specified block hash.
                        - block number: Decimal string. Queries based on the specified block height.
                        - block tag: Enter "earliest" or "latest" to query the first block or the most recent block.
                      pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Bitcoin Cash
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |-
                        Parameter specifying the point in time for balance query. You can enter one of the following formats:
                        - block hash: 64-character hexadecimal string (256-bit). Queries based on the specified block hash.
                        - block number: Decimal string. Queries based on the specified block height.
                        - block tag: Enter "earliest" or "latest" to query the first block or the most recent block.
                      pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                      default: latest
                - title: Dogecoin
                  type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |-
                        Parameter specifying the point in time for balance query. You can enter one of the following formats:
                        - block hash: 64-character hexadecimal string (256-bit). Queries based on the specified block hash.
                        - block number: Decimal string. Queries based on the specified block height.
                        - block tag: Enter "earliest" or "latest" to query the first block or the most recent block.
                      pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                      default: latest
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                oneOf:
                  - title: Aptos
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/items/items"
                  - title: Arbitrum
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Arc
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Base
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: BNB Smart Chain
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Chiliz
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Ethereum
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Ethereum Classic
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Giwa
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Kaia
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Luniverse
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Optimism
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Polygon
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlocksWithinRange/post/responses/200/content/application~1json/schema/oneOf/1/allOf/1/properties/items/items"
                  - title: Bitcoin
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlockByHashOrNumber/post/responses/200/content/application~1json/schema/oneOf/14/allOf/0"
                  - title: Bitcoin Cash
                    allOf:
                      - type: object
                        required:
                          - hash
                          - height
                          - version
                          - timestamp
                          - nonce
                          - bits
                          - difficulty
                          - merkleRoot
                          - transactionCount
                          - size
                          - weight
                          - previousBlockHash
                          - nextBlockHash
                          - medianTime
                          - strippedSize
                          - transactions
                        example:
                          hash: 00000000770ebe897270ca5f6d539d8afb4ea4f4e757761a34ca82e17207d886
                          height: 20000
                          version: 1
                          timestamp: 1248291739
                          nonce: 2406314246
                          bits: 1d00ffff
                          difficulty: "1"
                          merkleRoot: 01f8255cad4f0060170f5cca22a5e0ca99fa62b3d26b89a34ac3100d876d14a4
                          transactionCount: 1
                          size: 215
                          weight: 860
                          previousBlockHash: 00000000ba36eb929dc90170a96ee3efb76cbebee0e0e5c4da9eb0b6e74d9124
                          nextBlockHash: 000000002434a3edf8dee4fe506d306c59d3bf41f73d979f30ed3f7b7c34d06c
                          medianTime: 1248287332
                          strippedSize: 215
                          transactions:
                            - 01f8255cad4f0060170f5cca22a5e0ca99fa62b3d26b89a34ac3100d876d14a4
                        properties:
                          hash:
                            type: string
                            description: SHA-256 hash value that uniquely identifies the block. Generated by combining block header information; serves as a unique identifier within the blockchain with no duplicates.
                          height:
                            type: integer
                            description: Number indicating the position of the block in the blockchain. The genesis block starts at 0, and subsequent blocks increment by 1.
                          version:
                            type: integer
                            description: Block version number, used to identify the block validation rules used by the network. Updated when new features are added.
                          timestamp:
                            type: integer
                            description: Represents when the block was created, displayed as a UNIX timestamp.
                          nonce:
                            type: integer
                            description: Value used in the Proof-of-Work algorithm; a variable that is changed multiple times to find a valid block hash.
                          bits:
                            type: string
                            description: Compressed 32-bit hexadecimal value representing the difficulty target that the block hash must satisfy. This value varies according to the network's mining difficulty.
                            example: "386097818"
                          difficulty:
                            type: string
                            description: Represents the difficulty of the block, calculated as the ratio between the initial target value and the current target value. Reflects the relative difficulty of mining.
                          merkleRoot:
                            type: string
                            description: Root hash value calculated by constructing a Merkle tree from the hashes of all transactions included in the block. Used to verify data integrity.
                          transactionCount:
                            type: integer
                            description: Indicates the total number of transactions included in the block. Used to check the volume of transactions in a mined block.
                          size:
                            type: integer
                            description: Total size of the block including header and transaction data, in bytes. Represents the actual disk space required to store the block data.
                          weight:
                            type: integer
                            description: Block weight calculated according to BIP-141, taking SegWit data into account.
                          previousBlockHash:
                            type: string
                            description: Hash of the previous block; maintains the linkage between blocks in the blockchain. Null for the genesis block.
                          nextBlockHash:
                            type: string
                            description: Hash of the next block; null for the most recent block. Indicates the end of the chain.
                          medianTime:
                            type: integer
                            description: Median of the timestamps of the most recent 11 blocks. Used to reduce time volatility and provide a more stable block time.
                          strippedSize:
                            type: integer
                            description: Size of the block excluding SegWit data. Measured in bytes; represents the raw transaction data and header size.
                          transactions:
                            type: array
                            description: Array of transaction hash values included in the block. Each transaction is identified by its unique hash.
                            items:
                              type: string
                              description: SHA-256 hash value that uniquely identifies each transaction.
                      - type: object
                        properties:
                          ablastate:
                            type: object
