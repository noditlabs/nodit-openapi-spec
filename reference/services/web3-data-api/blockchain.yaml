                                    value:
                                      type: string
                                      description: Returns the asset amount as a string. The amount format varies by currency. For \"XRP\", the value is in standard XRP units where 1 XRP equals 1,000,000 drops. IOU assets are expressed based on the precision defined by the issuer.
                                      example: "100.5"
                                  description: Asset amount actually applied when cashing the check. Must have the same asset code and issuer as the check's sendMax field, within that range. In CheckCash, only amount or deliverMin is included, not both.
