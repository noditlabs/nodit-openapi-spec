                        to:
                          type: string
                          description: A field representing the recipient address of the transaction. For contract creation transactions, this field returns null. Provided as a 40-character hexadecimal string prefixed with 0x.
                        value:
                          type: string
                          description: A field representing the amount of tokens transferred in the transaction. Provided in decimal string format.
                        input:
                          type: string
                          description: "A field representing the data of the transaction. For Native Token (ETH, MATIC, etc.) transfers, this field is empty. Provided as a hexadecimal string prefixed with 0x. "
                        decodedInput:
                          type: object
                          description: A field representing the decoded result of the transaction input. Included in the response only when the withDecode parameter is set to true, providing function data executed based on the decoded input. This field is not provided even when withDecode is true if the function cannot be identified.
                          properties:
                            type:
                              type: string
                              description: A field representing the function type of the transaction.
                            name:
                              type: string
                              description: A field representing the function name of the transaction.
                            signature:
                              type: string
                              description: A field representing the function signature of the transaction.
                            args:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                    description: A field representing the name of the argument.
                                  type:
                                    type: string
                                    description: A field representing the type of the argument.
                                  value:
                                    type: string
                                    description: A field representing the value of the argument.
                        functionSelector:
                          type: string
                          description: A 4-byte function selector value that identifies the called function. The function selector is the first 4 bytes of the Keccak-256 hash of the function signature. Provided as an 8-character hexadecimal string prefixed with 0x.
                        nonce:
                          type: string
                          description: A field representing the nonce value of the transaction. Used for transaction deduplication and ordering. Provided in decimal string format.
                        gas:
                          type: string
                          description: A field representing the maximum amount of gas the user intends to allocate for transaction execution. Provided in decimal string format.
                        gasPrice:
                          type: string
                          description: A field representing the amount the user is willing to pay per unit of gas. Used in the transaction model before EIP-1559 (London Hard fork) with fixed fees; users can manually set the price based on network congestion. Provided in decimal string format.
                        maxFeePerGas:
                          type: string
                          description: A field representing the maximum fee the user is willing to pay per unit of gas. Must be greater than or equal to the sum of baseFeePerGas and maxPriorityFeePerGas. Part of the variable fee model introduced in EIP-1559 (London Hard fork). This field is not provided for transactions before this introduction. Provided in decimal string format.
                        maxPriorityFeePerGas:
                          type: string
                          description: The maximum fee per unit of gas that the user wants to pay directly to the block builder. Higher values cause the block builder to prioritize the transaction. Part of the variable fee model introduced in EIP-1559 (London Hard fork). This field is not provided for transactions before this introduction. Provided in decimal string format.
                        gasUsed:
                          type: string
                          description: A field representing the amount of gas actually used in transaction execution. Provided in decimal string format.
                        cumulativeGasUsed:
                          type: string
                          description: A field representing the total gas used by all transactions in the block up to and including the current transaction. Provided in decimal string format.
                        effectGasPrice:
                          type: string
                          description: A field representing the average price actually paid per unit of gas by the transaction. Part of the variable fee model introduced in EIP-1559 (London Hard fork). This field is not provided for transactions before this introduction. Provided in decimal string format.
                        contractAddress:
                          type: string
                          description: A field representing the created contract address when the transaction is a contract creation transaction. Provided as a 40-character hexadecimal string prefixed with 0x.
                        type:
                          type: string
                          description: |
                            A field representing the type of the transaction. This field may not be provided depending on the block context. Provided in decimal string format.
                            0: Represents a standard Ethereum transaction. This is the traditional transaction format before EIP-2718.
                            1: Represents the 'Access List' transaction introduced in EIP-2930. This type includes an access list for specific addresses and storage slots to optimize gas costs.
                            2: Represents the 'Fee Market' transaction introduced in EIP-1559. This type uses a variable gas cost model and includes maxFeePerGas and maxPriorityFeePerGas fields.
                            3: Represents the 'Blob Transaction' introduced in EIP-4844. This type includes additional blob data separate from the body, improving data availability and supporting scalability in conjunction with Layer2 solutions such as Rollups.
                            4: An extended transaction type introduced in EIP-7702, containing an authorizationList field with signature/authorization information. Used when multi-signature or additional authentication procedures are required.
                        status:
                          type: string
                          description: A field representing the status of the transaction. 1 indicates success; 0 indicates failure. This field is not provided for transactions before the Byzantium Hard Fork. Provided in decimal string format.
                        logsBloom:
                          type: string
                          description: A field representing all logs bloom of the transaction. Provided as a 512-character hexadecimal string prefixed with 0x.
                        accessList:
                          type: array
                          description: A field representing the access list of the transaction.
                          items:
                            type: object
                            required:
                              - address
                              - storageKeys
                            properties:
                              address:
                                type: string
                                description: A field representing the contract address accessed in the transaction. Provided as a 40-character hexadecimal string prefixed with 0x.
                              storageKeys:
                                type: array
                                description: A field representing the list of storage keys of the contract accessed in the transaction.
                                items:
                                  type: string
                                  description: A field representing a storage key of the contract accessed in the transaction. Provided as a 64-character hexadecimal string prefixed with 0x.
                        timeStamp:
                          type: integer
                          description: A field representing when the transaction was created. This field is provided as a UNIX timestamp.
                        authorizationList:
                          type: array
                          description: This field is a list containing the transaction's signature and authorization information. Each item includes chain ID, nonce, signature values, etc. required for signature verification. Provided after EIP-7702. Support and adoption may vary by network, and this field may not be present depending on the transaction type (e.g., type 4 or higher).
                          items:
                            type: object
                            properties:
                              chainId:
                                type: string
                                description: A field representing the ID of the chain for which the authorization is valid. Used for signature verification and replay attack prevention. Expressed in decimal string format.
                              nonce:
                                type: string
                                description: A nonce value to ensure the uniqueness of this authorization item and prevent replay attacks. Expressed in decimal string format.
                              address:
                                type: string
                                description: The address of the account that provided the authorization (signature).
                              yParity:
                                type: string
                                description: A 1-bit parity value used to select the y-coordinate of the signed public key. Typically 0 or 1, used for public key recovery. Expressed in decimal string format.
                              r:
                                type: string
                                description: The first value of the ECDSA signature, generated through the nonce used for signing and curve operations. Used for public key recovery and signature verification.
                              s:
                                type: string
                                description: The second value of the ECDSA signature, calculated based on the message hash and private key. Essential for verifying signature validity.
                        logs:
                          type: array
                          description: A field representing the list of logs included in the transaction. Provided only when the withLogs parameter is true.
                          items:
                            $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsInBlock/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/items/items/allOf/1/properties/logs/items"
