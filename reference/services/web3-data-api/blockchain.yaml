                                  example: 5
                                transactions:
                                  type: array
                                  description: |
                                    A field that represents the list of version numbers for all transactions included in the block.
                                    Each version number serves as a unique identifier for the transaction, sorted sequentially from firstVersion to lastVersion.
                                    This list enables retrieval of detailed information for individual transactions in the block.
                                  items:
                                    type: integer
                                    example: 2854257037
                                  example:
                                    - 2854257037
                                    - 2854257038
                                    - 2854257039
                                    - 2854257040
                                    - 2854257041
                                    - 2854257042
                              example:
                                hash: "0xfaed12ecb5ac7b0bc87508d4a0bb562523b599e5ffd4719e159087985b184042"
                                height: 160155267
                                timestamp: 1749003732416395
                                firstVersion: 2820166554
                                lastVersion: 987654325
                                transactionsCount: 5
                                transactions:
