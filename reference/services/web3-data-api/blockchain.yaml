  /{chain}/{network}/blockchain/getTransactionsByVersions:
    post:
      security:
        - api_key: []
      operationId: getTransactionsByVersions
      summary: Get Transactions By Versions
      description: |+
        Retrieves information for multiple transactions. Up to 1,000 transactions can be queried.


        > 🚧 Getting a 429 error? Check your subscription plan!
        > A 429 error may occur when the throughput limit of your subscribed plan is exceeded.
        > For example, the Starter plan has a limit of 300 CU per second, so calling an API that consumes 350 CU while on the Starter plan may result in a 429 error.
        > Check the CU consumption of the API you are using on the Compute Unit Costs page, and consider upgrading to a higher plan if you need more throughput!
        > 👉 [Go to Compute Unit Costs page](/guides/compute-unit)

      x-seo-description: Retrieve multiple transactions by their version numbers.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: Aptos
              type: object
              required:
                - transactionVersions
              properties:
                transactionVersions:
                  type: array
                  items:
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByVersion/post/requestBody/content/application~1json/schema/properties/transactionVersion"
                  minItems: 1
                  maxItems: 1000
                  description: Enter the transaction versions to query as an array.
                withBalanceChanges:
                  $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByVersion/post/requestBody/content/application~1json/schema/properties/withBalanceChanges"
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: Aptos
                type: array
                items:
                  type: object
                  required:
                    - transactionHash
                    - transactionVersion
                    - blockHeight
                    - blockTimestamp
                    - expirationTimestampSecs
                    - gasUnitPrice
                    - gasUsed
                    - maxGasAmount
                    - secondarySigners
                    - sender
                    - sequenceNumber
                    - success
                    - vmStatus
                    - events
                    - balanceInAccounts
                    - balanceOutAccounts
                    - balanceChangedTokens
                  properties:
                    transactionHash:
                      type: string
                      description: |
                        A field that represents the unique identifier of the transaction.
                        A cryptographic hash computed from all transaction data (signed payload), provided as a 64-character hexadecimal string prefixed with 0x.
                        Used to verify transaction integrity and to uniquely identify the transaction.
                      example: "0x2a41cd44491bb92d4eb17d8487f82d9b43ab6289074c1986ee055be8105707c9"
                    transactionVersion:
                      type: integer
                      description: |
                        A field that represents the version of the transaction.
                        A unique sequence ID indicating the order of the transaction on the chain, incrementing sequentially from 0.
                        Used to ensure transaction execution order and to query the state of a specific transaction.
                      example: 2854257037
                    blockHeight:
                      type: integer
                      description: |
                        A field that represents the height of the block containing the transaction.
                        Provided as an integer that increments sequentially from the genesis block (0).
                        Used to identify which block the transaction was included in and to verify if the transaction has been finalized.
                      example: 160155267
                    blockTimestamp:
                      type: integer
                      description: |
                        A field that represents the creation time of the block containing the transaction.
                        Provided as a UNIX timestamp; this value means both when the block was created and when the transactions in that block were processed.
                      example: 1749003732416395
                    expirationTimestampSecs:
                      type: integer
                      description: |
                        A field that represents the expiration time of the transaction.
                        Provided as a UNIX timestamp in seconds; the transaction cannot be included in the chain after this time.
                        Sets the validity period of the transaction to prevent old transactions from being processed.
                      example: 1749003762
                    gasUnitPrice:
                      type: string
                      description: |
                        A field that represents the gas unit price of the transaction.
                        Provided in Octas (1 APT = 10^8 Octas); indicates the amount to pay per gas unit.
                        Used to determine transaction processing priority and to calculate transaction fees.
                      example: "100"
                    gasUsed:
                      type: string
                      description: |
                        A field that represents the amount of gas actually consumed during transaction execution.
                        A unit that measures the amount of computing resources consumed for transaction processing.
                        Actual transaction fee is calculated as gasUsed * gasUnitPrice.
                      example: "678"
                    maxGasAmount:
                      type: string
                      description: |
                        A field that represents the maximum amount of gas available for the transaction.
                        The transaction fails if this value is exceeded during execution; serves as a cap on gas cost.
                        Prevents users from paying unexpectedly high fees.
                      example: "2000"
                    secondarySigners:
                      type: array
                      description: |
                        A field that represents the list of addresses of additional signers in a multi-signature transaction.
                        Contains the addresses of accounts that signed the transaction in addition to the primary signer (sender).
                        Used for complex permission management or transactions requiring multiple approvals.
                      items:
                        type: string
                      example:
                        - "0x1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
                        - "0xabcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890"
                    sender:
                      type: string
                      description: |
                        A field that represents the address of the account that initiated the transaction.
                        Provided as a 64-character hexadecimal string prefixed with 0x; identifies the principal of the transaction.
                        The account against which transaction fee payment and sequence number management are applied.
                      example: "0x948592877d14d0fde0a42e2fc15a56959f30ea35d0b87c7ee8e98e0cce756f1a"
                    sequenceNumber:
                      type: integer
                      description: |
                        A field that represents the current sequence number of the sender account.
                        Starts at 0 and increments by 1 per transaction per account; prevents replay attacks and ensures transaction order.
                        Transactions with the same sequence number cannot be executed redundantly.
                      example: 42
                    success:
                      type: boolean
                      description: |
                        A field that indicates whether the transaction executed successfully.
                        true means the transaction was executed successfully; false means an error occurred during execution.
                      example: true
                    vmStatus:
                      type: string
                      description: |
                        A field that represents the execution result status of the transaction.
                        Returns 'Executed successfully' on success; includes specific error messages on failure.
                        Helps analyze the cause of transaction failures and troubleshoot issues.
                      example: Executed successfully
                    events:
                      type: array
                      description: |
                        A field that represents the list of events emitted during transaction execution.
                        Each event records state changes or important operations caused by the transaction.
                        Provides information to track transaction impact and for integration with external systems.
                      items:
                        type: object
                        required:
                          - eventIndex
                          - eventType
                          - accountAddress
                          - data
                          - creationNumber
                          - sequenceNumber
                          - objectAddress
                          - objectOwnerAddress
                        properties:
                          eventIndex:
                            type: integer
                            description: |
                              A field that represents the order index of the event within the transaction.
                              Indicates the order of the current event among multiple events emitted in a single transaction.
                              Starts at 0 and increments in event emission order; used to identify the order of events within the same transaction.
                            example: 0
                          eventType:
                            type: string
                            description: |
                              A field that represents the type of the event.
                              Provided as the full path (address::module::struct) of the event struct defined in the Move module.
                              Used to identify the type of operation that caused the balance change.
                            example: 0x1::coin::WithdrawEvent
                          accountAddress:
                            type: string
                            description: |
                              A field that represents the address of the resource owner that emitted the event.
                              Provided as a 64-character hexadecimal string prefixed with 0x; identifies the owner of the resource where the event occurred.
                              The account that owns the event handle; can be used as a filter condition when querying events.
                            example: "0x948592877d14d0fde0a42e2fc15a56959f30ea35d0b87c7ee8e98e0cce756f1a"
                          data:
                            type: object
                            description: |
                              A field that represents the specific data of the event.
                              The fields of the event struct defined in eventType are provided as a JSON object.
                              Contains the event details and may have different structures depending on the event type.
                            example:
                              amount: "1000000"
                              from: "0x948592877d14d0fde0a42e2fc15a56959f30ea35d0b87c7ee8e98e0cce756f1a"
                              to: "0xa1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
                          creationNumber:
                            type: integer
                            description: |
                              A field that represents the creation number of the event handle.
                              A unique identifier to distinguish event handles created by an account, incrementing sequentially from 0.
                              Used to distinguish different types of events emitted from the same account.
                            example: 2
                          sequenceNumber:
                            type: integer
                            description: |
                              A field that represents the sequence number of the event emitted from the event handle.
                              Indicates the order of events emitted from the same event handle.
                              Starts at 0 and increments sequentially; ensures the time order of events emitted from a specific event handle.
                            example: 12345
                          objectAddress:
                            type: string
                            description: |
                              A field that represents the address of the Object when the event is for an Object resource.
                              Provided as a 64-character hexadecimal string prefixed with 0x; the unique identifier for Object-based resources.
                              Used to track and query events related to Object resources.
                            example: "0xbae207659db88bea0cbead6da0ed00aac12edcdda169e591cd41c94180b46f3b"
                          objectOwnerAddress:
                            type: string
                            description: |
                              A field that represents the owner address of the Object identified by objectAddress.
                              Provided as a 64-character hexadecimal string prefixed with 0x; identifies the current owner of the Object.
                              Used for Object ownership tracking and permission verification.
                            example: "0x948592877d14d0fde0a42e2fc15a56959f30ea35d0b87c7ee8e98e0cce756f1a"
                    balanceInAccounts:
                      type: array
                      description: |
                        A field that represents the list of addresses of accounts that received assets in the transaction.
                        Contains addresses of accounts with positive values (deposits) in balanceChanges.
                        Used to track asset transfer recipients and analyze deposit history.
                      items:
                        type: string
                      example:
                        - "0xa1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2"
                    balanceOutAccounts:
                      type: array
                      description: |
                        A field that represents the list of addresses of accounts that sent assets in the transaction.
                        Contains addresses of accounts with negative values (withdrawals) in balanceChanges.
                        Used to track asset transfer senders and analyze withdrawal history.
                      items:
                        type: string
                      example:
                        - "0xb2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3"
                    balanceChangedTokens:
                      type: array
                      description: |
                        A field that represents the list of token types whose balances changed due to the transaction.
                        Each token is provided in 'moduleAddress::moduleName::structName' format.
                        Used to identify the types of assets affected by the transaction and to track changes per asset.
                      items:
                        type: string
                      example:
                        - 0x1::aptos_coin::AptosCoin
                        - 0x1::usdc::USDC
                    balanceChanges:
                      type: object
                      required:
                        - eventIndex
                        - eventType
                        - subEventIndex
                        - accountAddress
                        - assetType
                        - linkedAssetType
                        - changeValue
                        - tokenStandard
                        - transferType
                      properties:
                        blockHeight:
                          type: integer
                          description: |
                            A field that represents the height of the block containing this balance change.
                            An integer that increments sequentially starting from the genesis block (0), used as an indicator for the blockchain length and the position of a specific block.
                          example: 160155267
                        blockTimestamp:
                          type: integer
                          description: |
                            A field that represents the block creation time.
                            Provided as a UNIX timestamp, used for block creation order and time tracking.
                            Block timestamps are used to ensure transaction order and measure inter-block creation intervals.
                          example: 1749003732416395
                        transactionHash:
                          type: string
                          description: |
                            A field that represents the hash of the transaction that caused the balance change.
                            A cryptographic hash computed from all transaction data, provided as a 64-character hexadecimal string prefixed with 0x.
                            This hash enables retrieval of full information for the transaction related to the balance change.
                          example: "0x2a41cd44491bb92d4eb17d8487f82d9b43ab6289074c1986ee055be8105707c9"
                        transactionVersion:
                          type: integer
                          description: |
                            A field that represents the version of the transaction where the balance change occurred.
                            A unique sequence ID indicating the order of the transaction on the chain, incrementing sequentially from 0.
                          example: 34872482
                        eventIndex:
                          type: integer
                          description: |
                            A field that represents the order index of the event within the transaction.
                            Indicates the order of the current event among multiple events emitted in a single transaction.
                            Starts at 0 and increments in event emission order; used to identify the order of events within the same transaction.
                          example: 0
                        eventType:
                          type: string
                          description: |
                            A field that represents the type of the event.
                            Provided as the full path (address::module::struct) of the event struct defined in the Move module.
                            Used to identify the type of operation that caused the balance change.
                          example: 0x1::coin::WithdrawEvent
                        subEventIndex:
                          type: integer
                          description: |
                            A field that represents the order of asset changes when multiple asset changes occur within a single event.
                            Identifies the order of multiple asset changes within an event sharing the same eventIndex.
                            Starts at 0 and increments sequentially; plays an important role in complex asset operations (e.g., swaps).
                          example: 0
                        accountAddress:
                          type: string
                          description: |
                            A field that represents the address of the account where the balance change occurred.
                            Provided as a 64-character hexadecimal string prefixed with 0x; identifies the account whose asset balance changed.
                            This address is either the asset owner or the destination account the asset was transferred to.
                          example: "0x948592877d14d0fde0a42e2fc15a56959f30ea35d0b87c7ee8e98e0cce756f1a"
                        assetType:
                          type: string
                          description: |
                            A field that represents the type of the asset whose balance changed.
                            Provided in one of two formats:
                            - Coin: Asset ID in Move struct format (e.g., 0x1::aptos_coin::AptosCoin)
                            - Fungible Asset: Object address that owns the metadata of the asset
                            Used to uniquely identify the type of asset.
                          example: 0x1::aptos_coin::AptosCoin
                        linkedAssetType:
                          type: string
                          description: |
                            A common identifier that links Coin and Fungible Asset when they have been migrated.
                            This field serves as a unified key that groups Coin/Fungible Asset into a single asset unit for identification and retrieval, providing the Object address where the migrated Fungible Asset's Metadata is stored.
                          example: "0xbae207659db88bea0cbead6da0ed00aac12edcdda169e591cd41c94180b46f3b"
                        changeValue:
                          type: string
                          description: |
                            A field that represents the balance change amount.
                            Provided as a string in integer form.
                            - Positive: indicates the account balance increased
                            - Negative: indicates the account balance decreased
                            The actual value must be interpreted considering decimals.
                          example: "1000000"
                        tokenStandard:
                          type: string
                          description: |
                            A field that represents the standard type of the asset.
                            - v1: Assets following the Coin standard
                            - v2: Assets following the Fungible Asset standard
                          example: coin
                        transferType:
                          type: string
                          description: |
                            A field that represents the transfer direction or action type.
                            Indicates the specific type of balance change; the following values are possible:
                            - deposit: asset deposit
                            - withdraw: asset withdrawal
                            - swap_in: deposit from swap
                            - swap_out: withdrawal from swap
                            - gas: gas fee payment
                            - refund_gas: gas fee refund
                          example: deposit
