                              address: bc1q0a7h7sa94e8svscf8sxmhyj8fujgy423fzjjfr
                              value: "0.00506140"
                              coinbase: null
                              voutTransactionId: c2976d591a92cc39f2bb1f367afbc2d6ae6e3c940b640eb245dfbeef75d340db
                              voutIndex: 0
                              scriptSig:
                                hex: 3045022100b228e33e8b62f825...
                                asm: OP_HASH160 OP_PUSHBYTES_20 000000...
                                type: witness_v0_keyhash
                              sequence: 4294967295
                              witness:
                                - 3045022100b228e33e8b62f825...
                            properties:
                              index:
                                type: integer
                                description: Indicates the index of the Vin (input) within the containing transaction.
                                example: 0
                              address:
                                type: string
                                description: Address of the previous Vout (output) referenced by the Vin (input); represents the sender address that transferred the Bitcoin.
                                example: bc1q0a7h7sa94e8svscf8sxmhyj8fujgy423fzjjfr
                              value:
                                type: string
                                description: Output value of the previous Vout (output) referenced by the Vin (input); represents the amount of Bitcoin being transferred (in BTC units).
                                example: "0.00506140"
                              coinbase:
                                type: string
                                description: Used in coinbase transactions (mining reward transactions); contains arbitrary data defined by the miner. Set to null for regular transactions.
                              voutTransactionId:
                                type: string
                                description: ID of the previous transaction (Vout) referenced by the Vin (input). This field is null for coinbase transactions.
                                example: c2976d591a92cc39f2bb1f367afbc2d6ae6e3c940b640eb245dfbeef75d340db
                              voutIndex:
                                type: integer
                                description: Index of the previous Vout (output) referenced by the Vin (input). Null for coinbase transactions.
                                example: 0
                              scriptSig:
                                type: object
                                required:
                                  - hex
                                  - asm
                                  - type
                                description: Signature script of the Vin (input); used to unlock the lock script of the referenced previous Vout (output).
                                properties:
                                  hex:
                                    type: string
                                    description: Signature script of the Vin (input) in hexadecimal format. Provided as an empty string for SegWit transactions.
                                    example: 3045022100b228e33e8b62f825...
                                  asm:
                                    type: string
                                    description: Signature script of the Vin (input) in assembly format. Provided as an empty string for SegWit transactions.
                                    example: OP_HASH160 OP_PUSHBYTES_20 000000...
                                  type:
                                    type: string
                                    description: Indicates the signature script type of the Vin (input) (e.g., `p2pkh`, `p2sh`).
                                    example: witness_v0_keyhash
                              sequence:
                                type: integer
                                description: Sequence number of the Vin (input); controls transaction validity or works with `locktime`. Also used for RBF (Replace-By-Fee) control.
                                example: 4294967295
                              witness:
                                type: array
                                description: Array of script signature data for the Vin (input), included for SegWit transactions.
                                items:
                                  type: string
                                  example: 3045022100b228e33e8b62f825...
                          vout:
                            type: object
                            required:
                              - index
                              - address
                              - value
                              - scriptPubKey
                            example:
