  /{chain}/{network}/blockchain/getTransactionByVersion:
    post:
      security:
        - api_key: []
      operationId: getTransactionByVersion
      summary: Get Transaction by Version
      description: |
        Retrieves a specific transaction by version number.
      x-seo-description: Retrieve a specific transaction by its version number.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              title: Aptos
              type: object
              required:
                - transactionVersion
              properties:
                transactionVersion:
                  type: integer
                  description: Parameter specifying the transaction version to query. The transaction version must be entered as a positive integer.
                  pattern: ^[-+]?[0-9]+$
                withBalanceChanges:
                  type: boolean
                  description: |-
                    Parameter specifying whether to include the balanceChanges field in the response.

                    - balanceChanges is a field containing balance changes for Native token (APT) and Tokens.
                    - Response speed may be slower when true is set for this parameter.
                  default: false
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                title: Aptos
                $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsByVersions/post/responses/200/content/application~1json/schema/items"
        "400":
          $ref: "#/components/responses/400"
        "401":
