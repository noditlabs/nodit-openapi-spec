                        - type: object
                          properties:
                            vin:
                              $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/vin"
                            vout:
                              $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/vout"
                  - title: Bitcoin Cash
                    type: array
                    items:
                      allOf:
                        - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0"
                        - type: object
                          properties:
                            vin:
                              $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/vin"
                            vout:
                              $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/vout"
                  - title: Dogecoin
                    type: array
                    items:
                      allOf:
                        - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/0"
                        - type: object
                          properties:
                            vin:
                              $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/vin"
                            vout:
                              $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByTransactionId/post/responses/200/content/application~1json/schema/oneOf/0/allOf/1/properties/vout"
