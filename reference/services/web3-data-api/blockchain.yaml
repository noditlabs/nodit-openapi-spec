        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
              - sepolia
              - hoodi
              - kairos
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - title: Aptos
                  type: object
                  required:
                    - transactionHash
                  properties:
                    transactionHash:
                      type: string
                      description: Parameter specifying the transaction hash to query. The transaction hash must be entered as a 64-character hexadecimal string (including "0x").
                      pattern: ^0[xX][0-9a-fA-F]{64}
                    withBalanceChanges:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByVersion/post/requestBody/content/application~1json/schema/properties/withBalanceChanges"
