openapi: 3.1.0
info:
  title: Solana - getEpochSchedule
  version: 1.0.0
servers:
  - url: https://solana-mainnet.nodit.io
    description: Solana Mainnet
  - url: https://solana-devnet.nodit.io
    description: Solana Devnet
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
  schemas:
    SuccessfulResponse:
      type: object
      properties:
        id:
          type: integer
          description: The request ID
        jsonrpc:
          type: string
          description: The JSON-RPC version
    ErrorFromRPC:
      type: object
      properties:
        code:
          type: integer
          description: Returns a code that identifies the situation where the error occurred.
          example: -32602
        message:
          type: string
          description: Returns a detailed message explaining the cause of the error.
      required:
        - code
        - message
    Error:
      type: object
      properties:
        code:
          type: string
          description: Returns a code that identifies the situation where the error occurred.
        message:
          type: string
          description: Returns a detailed message explaining the cause of the error.
      required:
        - code
        - message
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              jsonrpc:
                type: string
                description: JSON-RPC version
                example: "2.0"
              id:
                type: integer
                description: Request ID
                example: 1
              error:
                $ref: "#/components/schemas/ErrorFromRPC"
            required:
              - jsonrpc
              - id
              - error
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: AUTHENTICATION_FAILED
              message: Authentication failed
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: PERMISSION_DENIED
              message: Permission denied
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: RESOURCE_NOT_FOUND
              message: "Resource not found: { RESOURCE1_NAME = RESOURCE1_VALUE, RESOURCE2_NAME = RESOURCE2_VALUE, ... }"
    "429":
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: TOO_MANY_REQUESTS
              message: Too many requests
paths:
  /:
    post:
      security:
        - api_key: []
      operationId: solana-getEpochSchedule
      summary: getEpochSchedule
      description: |
        Returns the epoch schedule information from this cluster
      x-seo-description: Returns the epoch schedule configuration including slots per epoch for the Solana network.
      tags:
        - http
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jsonrpc
                - id
                - method
              properties:
                jsonrpc:
                  type: string
                  default: "2.0"
                id:
                  type: integer
                  default: 1
                method:
                  type: string
                  default: getEpochSchedule
              example:
                jsonrpc: "2.0"
                id: 1
                method: getEpochSchedule
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessfulResponse"
                  - type: object
                    properties:
                      result:
                        type: object
                        properties:
                          firstNormalEpoch:
                            type: integer
                            format: uint64
                            description: First normal-length epoch, log2(slotsPerEpoch) - log2(MINIMUM_SLOTS_PER_EPOCH)
                          firstNormalSlot:
                            type: integer
                            format: uint64
                            description: Minimum number of slots in an epoch, MINIMUM_SLOTS_PER_EPOCH * (2.pow(firstNormalEpoch) - 1)
                          leaderScheduleSlotOffset:
                            type: integer
                            format: uint64
                            description: The number of slots before beginning of an epoch to calculate a leader schedule for that epoch.
                          slotsPerEpoch:
                            type: integer
                            format: uint64
                            description: The maximum number of slots in each epoch.
                          warmup:
                            type: boolean
                            description: Whether epochs start short and grow.
                example:
                  jsonrpc: "2.0"
                  result:
                    firstNormalEpoch: 8
                    firstNormalSlot: 8160
                    leaderScheduleSlotOffset: 8192
                    slotsPerEpoch: 8192
                    warmup: true
                  id: 1
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
