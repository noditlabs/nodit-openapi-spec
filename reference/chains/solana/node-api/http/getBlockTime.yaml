openapi: 3.1.0
info:
  title: Solana - getBlockTime
  version: 1.0.0
servers:
  - url: https://solana-mainnet.nodit.io
    description: Solana Mainnet
  - url: https://solana-devnet.nodit.io
    description: Solana Devnet
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
  schemas:
    BlockNumber:
      type: integer
      format: uint64
      description: Block number, identified by Slot.
    SuccessfulResponse:
      type: object
      properties:
        id:
          type: integer
          description: The request ID
        jsonrpc:
          type: string
          description: The JSON-RPC version
    ErrorObject:
      type: object
      properties:
        code:
          type: integer
          description: A Number that indicates the error type that occurred.
        message:
          type: string
          description: A String providing a short description of the error.
      required:
        - code
        - message
    ErrorFromRPC:
      type: object
      properties:
        code:
          type: integer
          description: Returns a code that identifies the situation where the error occurred.
          example: -32602
        message:
          type: string
          description: Returns a detailed message explaining the cause of the error.
      required:
        - code
        - message
    Error:
      type: object
      properties:
        code:
          type: string
          description: Returns a code that identifies the situation where the error occurred.
        message:
          type: string
          description: Returns a detailed message explaining the cause of the error.
      required:
        - code
        - message
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              jsonrpc:
                type: string
                description: JSON-RPC version
                example: "2.0"
              id:
                type: integer
                description: Request ID
                example: 1
              error:
                $ref: "#/components/schemas/ErrorFromRPC"
            required:
              - jsonrpc
              - id
              - error
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: AUTHENTICATION_FAILED
              message: Authentication failed
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: PERMISSION_DENIED
              message: Permission denied
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: RESOURCE_NOT_FOUND
              message: "Resource not found: { RESOURCE1_NAME = RESOURCE1_VALUE, RESOURCE2_NAME = RESOURCE2_VALUE, ... }"
    "429":
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
            example:
              code: TOO_MANY_REQUESTS
              message: Too many requests
paths:
  /:
    post:
      security:
        - api_key: []
      operationId: solana-getBlockTime
      summary: getBlockTime
      description: |
        Returns the estimated production time of a block.
      x-seo-description: Returns the estimated Unix timestamp for a specific block slot on the Solana blockchain.
      tags:
        - http
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jsonrpc
                - id
                - method
                - params
              properties:
                jsonrpc:
                  type: string
                  default: "2.0"
                id:
                  type: integer
                  default: 1
                method:
                  type: string
                  default: getBlockTime
                params:
                  type: array
                  minItems: 1
                  maxItems: 1
                  description: |
                    It contains following items:
                    1. Block number (`required`)
                  items:
                    oneOf:
                      - title: Block number
                        $ref: "#/components/schemas/BlockNumber"
              example:
                jsonrpc: "2.0"
                id: 1
                method: getBlockTime
                params:
                  - 338967300
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessfulResponse"
                  - type: object
                    properties:
                      result:
                        oneOf:
                          - title: available
                            type: integer
                            format: int64
                            description: Estimated production time, as Unix timestamp (seconds since the Unix epoch)
                          - title: unavailable
                            $ref: "#/components/schemas/ErrorObject"
                example:
                  jsonrpc: "2.0"
                  result: 1746833402
                  id: 1
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "429":
          $ref: "#/components/responses/429"
