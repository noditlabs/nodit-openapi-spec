    patch:
      security:
        - api_key: []
      operationId: optimism-updateWebhook
      summary: Update Webhook
      description: |+
        You can modify the subscription condition of a Webhook, or activate or deactivate a Webhook.

      x-seo-description: Update the configuration of an existing webhook subscription, including URL and event filters.
      tags:
        - Webhook API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - optimism
            default: optimism
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
            example: "5001"
          description: Parameter to specify the subscriptionId assigned to the Webhook you want to query. You can use the subscriptionId returned when creating a Webhook to query, modify, and delete Webhook information.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              additionalProperties: false
              type: object
              properties:
                notification:
                  type: object
                  description: Parameter specifying the information required to receive notifications when an event occurs.
                  properties:
                    webhookUrl:
                      type: string
                      description: Parameter specifying the webhook URL to receive notifications when the subscribed event occurs. A publicly accessible URL must be specified.
                description:
                  type: string
                  description: Parameter specifying the description of the event.
                isActive:
                  type: boolean
                  description: Parameter specifying whether the Webhook is active. When set to true, the Webhook is activated; when set to false, it is deactivated. A deactivated Webhook cannot receive notifications but is not deleted.
                condition:
                  type: object
                  description: Field for defining detailed conditions of the events you want to subscribe to. Available conditions vary by event type, so refer to the Webhook Types page for usage.
                  oneOf:
                    - title: ADDRESS_ACTIVITY
                      description: Monitors activity of accounts included in a specified address array. This event sends a notification whenever these accounts are involved as either sender (from) or recipient (to) in a transaction, i.e., when a transaction, token transfer (ERC20), or NFT transfer (ERC721, ERC1155) occurs. This service enables users to track activity across multiple addresses in real time and effectively monitor asset movements and transactions.
                      type: object
                      required:
                        - addresses
                      properties:
                        addresses:
                          type: array
                          description: "List of addresses to monitor for events.\t"
                          items:
                            type: string
                            format: ^0[xX][0-9a-fA-F]{40}$
                            default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                            example:
                              - CONTRACT_ADDRESS: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                                ABI: "[{\"anonymous\":false,\"inputs\":[{\"indexed\":true,\"name\":\"from\",\"type\":\"address\"},{\"indexed\":true,\"name\":\"to\",\"type\":\"address\"},{\"indexed\":false,\"name\":\"value\",\"type\":\"uint256\"}],\"name\":\"Transfer\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Pause\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Unpause\",\"type\":\"event\"}]"
                              - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                    - title: MINED_TRANSACTION
                      description: Provides a notification with receipt information when a transaction sent from a specific address is successfully mined and finally confirmed by the blockchain network. This event triggers notifications for both successful and failed transactions. Users can monitor the final status of their transactions in real time and confirm whether transactions succeeded or failed.
                      type: object
                      required:
                        - addresses
                      properties:
                        addresses:
                          type: array
                          description: List of sender addresses for transactions to monitor. You can receive notifications when a transaction with from matching any address in the array occurs.
                          items:
                            type: string
                            format: ^0[xX][0-9a-fA-F]{40}$
                            default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                            example:
                              - CONTRACT_ADDRESS: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                                ABI: "[{\"anonymous\":false,\"inputs\":[{\"indexed\":true,\"name\":\"from\",\"type\":\"address\"},{\"indexed\":true,\"name\":\"to\",\"type\":\"address\"},{\"indexed\":false,\"name\":\"value\",\"type\":\"uint256\"}],\"name\":\"Transfer\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Pause\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Unpause\",\"type\":\"event\"}]"
                              - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                    - title: SUCCESSFUL_TRANSACTION
                      description: Provides a notification when a transaction sent from a specific address is successfully processed. This event occurs when the transaction is fully confirmed and validated by the blockchain network. Users can confirm that their transaction was executed as expected and that the desired operation completed successfully.
                      type: object
                      required:
                        - addresses
                      properties:
                        addresses:
                          type: array
                          description: List of sender addresses for transactions to monitor. You can receive notifications when a transaction with from matching any address in the array occurs.
                          items:
                            type: string
                            format: ^0[xX][0-9a-fA-F]{40}$
                            default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                            example:
                              - CONTRACT_ADDRESS: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                                ABI: "[{\"anonymous\":false,\"inputs\":[{\"indexed\":true,\"name\":\"from\",\"type\":\"address\"},{\"indexed\":true,\"name\":\"to\",\"type\":\"address\"},{\"indexed\":false,\"name\":\"value\",\"type\":\"uint256\"}],\"name\":\"Transfer\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Pause\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Unpause\",\"type\":\"event\"}]"
                              - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                    - title: FAILED_TRANSACTION
                      description: Provides a notification when a transaction sent from a specific address fails. This event occurs when the transaction is rejected by the blockchain network or fails to complete due to an execution error. Users can quickly identify the cause of transaction failure and take necessary action. Failures can result from various technical issues such as insufficient gas, unmet contract conditions, etc. This event helps users manage blockchain transactions and track errors more effectively.
                      type: object
                      required:
                        - addresses
                      properties:
                        addresses:
                          type: array
                          description: List of sender addresses for transactions to monitor. You can receive notifications when a transaction with from matching any address in the array occurs.
                          items:
                            type: string
                            format: ^0[xX][0-9a-fA-F]{40}$
                            default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                            example:
                              - CONTRACT_ADDRESS: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                                ABI: "[{\"anonymous\":false,\"inputs\":[{\"indexed\":true,\"name\":\"from\",\"type\":\"address\"},{\"indexed\":true,\"name\":\"to\",\"type\":\"address\"},{\"indexed\":false,\"name\":\"value\",\"type\":\"uint256\"}],\"name\":\"Transfer\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Pause\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Unpause\",\"type\":\"event\"}]"
                              - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                    - title: TOKEN_TRANSFER
                      description: Provides a notification when a token (ERC20) transfer or NFT (ERC721, ERC1155) transfer occurs. Users can specify a contract address to monitor token movements from that contract. For NFTs under ERC721 and ERC1155 standards, you can also set a specific token ID as a condition to track transfers of only that token.
                      type: object
                      required:
                        - tokens
                      properties:
                        tokens:
                          type: array
                          description: Token information object for monitoring transfer events
                          items:
                            type: object
                            required:
                              - contractAddress
                            properties:
                              contractAddress:
                                type: string
                                description: Contract address of the ERC20, ERC721, or ERC1155 token to monitor
                                format: ^0[xX][0-9a-fA-F]{40}$
                                default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                                example:
                                  - CONTRACT_ADDRESS: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                                    ABI: "[{\"anonymous\":false,\"inputs\":[{\"indexed\":true,\"name\":\"from\",\"type\":\"address\"},{\"indexed\":true,\"name\":\"to\",\"type\":\"address\"},{\"indexed\":false,\"name\":\"value\",\"type\":\"uint256\"}],\"name\":\"Transfer\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Pause\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Unpause\",\"type\":\"event\"}]"
                                  - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                              tokenId:
                                type: string
                                description: Token ID when monitoring transfer events for a specific token in the ERC721 or ERC1155 contract only
                                format: ^[0-9]+$
                                example:
                                  - "1"
                                  - "9386"
                    - title: BELOW_THRESHOLD_BALANCE
                      description: Provides a notification when an account's balance falls below a user-specified threshold. This event is particularly useful for financial management and asset protection. Users can take preventive measures to ensure their account does not fall below a minimum balance and can timely transfer additional funds or take other financial actions when needed.
                      type: object
                      required:
                        - address
                        - belowThresholdBalance
                      properties:
                        address:
                          type: string
                          description: "Target address to receive balance notifications\t"
                          default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                          example:
                            - CONTRACT_ADDRESS: "0xdAC17F958D2ee523a2206206994597C13D831ec7"
                              ABI: "[{\"anonymous\":false,\"inputs\":[{\"indexed\":true,\"name\":\"from\",\"type\":\"address\"},{\"indexed\":true,\"name\":\"to\",\"type\":\"address\"},{\"indexed\":false,\"name\":\"value\",\"type\":\"uint256\"}],\"name\":\"Transfer\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Pause\",\"type\":\"event\"},{\"anonymous\":false,\"inputs\":[],\"name\":\"Unpause\",\"type\":\"event\"}]"
                            - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                        belowThresholdBalance:
                          type: string
                          description: |
                            Threshold balance to monitor. You receive a notification when the balance falls below the set threshold.
                            > 📘 What is the notification frequency?
                            >
                            > The balance of the address is queried every minute. If the balance is lower than the entered THRESHOLD, a notification is sent. If the actual balance remains below the value entered in belowThresholdBalance at each query, you will continue to receive notifications.
                          default: "1000000000000000000"
                          example:
                            - "1000000000"
                            - "100000000000"
                            - "1000000000000000000"
                    - title: BLOCK_PERIOD
                      description: Provides notifications according to the block interval on the network. Users can set a desired block period (e.g., every block, every N blocks) to receive block information at that interval. This event provides more stable and confirmed data by delivering information after a certain number of blocks have been confirmed.
                      type: object
                      required:
                        - period
                      properties:
                        period:
                          type: integer
                          description: Value for the block period at which to receive event notifications. Setting to 1 enables notifications for every block that is created.
                          default: 1
                          example:
                            - 1
                            - 2
                            - 10
                    - title: BLOCK_LIST_CALLER
                      description: Provides a notification when addresses on a block list send tokens to a target address. This event type is mainly used when you want to monitor activity from addresses on a predefined block list. For example, you can receive an immediate alert when blacklisted addresses attempt to transfer funds to a specific account. This is a useful tool for detecting illegal or suspicious fund movements in advance.
                      type: object
                      required:
                        - address
                        - blockListCallers
                      properties:
                        address:
                          type: string
                          description: Target address to monitor for token transfer events
                          default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                          example:
                            - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                            - "0x3f5CE5FBFe3E9af3971dD833D26bA9b5C936f0bE"
                        blockListCallers:
                          type: array
                          description: List of addresses for which you want to receive notifications when token transfers to the target address occur
                          items:
                            type: string
                            default: "0x6ccf8Ecfc7805145ce5e3f1448c2f54572970f74"
                            example:
                              - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                              - "0x3f5CE5FBFe3E9af3971dD833D26bA9b5C936f0bE"
                    - title: ALLOW_LIST_CALLER
                      description: Provides a notification when addresses on an allow list send tokens to a target address. This list contains trusted addresses, and fund movements from these addresses are considered safe or expected activity. Use this event type when you want to track activity from allowed addresses and verify fund transfers from addresses on the allow list.
                      type: object
                      required:
                        - address
                        - allowListCallers
                      properties:
                        address:
                          type: string
                          description: Target address to monitor for token transfer events
                          default: "0x4838b106fce9647bdf1e7877bf73ce8b0bad5f97"
                          example:
                            - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                            - "0x3f5CE5FBFe3E9af3971dD833D26bA9b5C936f0bE"
                        allowListCallers:
                          type: array
                          description: List of addresses for which you want to receive notifications when token transfers to the target address occur
                          items:
                            type: string
                            default: "0x6ccf8Ecfc7805145ce5e3f1448c2f54572970f74"
                            example:
                              - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                              - "0x3f5CE5FBFe3E9af3971dD833D26bA9b5C936f0bE"
                    - title: LOG
                      description: Provides a notification when a transaction containing specified smart contract event logs is created. Users can specify the account address (address) to monitor and event identifier information (topics) as filter conditions. For example, configuring monitoring for the ERC20 standard token transfer event Transfer(address,address,uint256) captures all transaction logs matching that event signature (0xddf252ad...). Use the LOG EventType to efficiently track important activities such as standard token transfers or specific smart contract events.
                      type: object
                      required:
                        - address
                        - topics
                      properties:
                        address:
                          type: string
                          description: Target address to monitor for token transfer events
                          default: "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                          example:
                            - "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                            - "0x3f5CE5FBFe3E9af3971dD833D26bA9b5C936f0bE"
                        topics:
                          type: array
                          description: |
                            Array of topics for the Event Log to monitor. Can contain up to 4 strings.

                            > 📘 The Topic fields of the event you want to monitor are used to filter data associated with smart contract events. Each topic contains the event's signature and indexed parameter information.
                            > **topics[0]: Event Signature**
                            > - topics[0] is always the Keccak256 hash of the event signature.
                            > For example, for the Transfer(address indexed from, address indexed to, uint256 value) event, the event signature can be verified with code like this:
                            > `Keccak256("Transfer(address,address,uint256)") = 0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef `
                            >
                            > **topics[1], topics[2], topics[3]: Indexed Parameters**
                            > - topics[1] onward correspond to indexed parameter values of the event. Only event parameters declared with the indexed keyword in the smart contract are included in topics. For the Transfer event example above, the from address maps to topics[1] and the to address to topics[2]. To filter events where from is a specific address, enter that address in topics[1]. Values for non-indexed parameters can be found in the data field of the retrieved logs.
                            >
                            > **How to find Topic values**
                            > - From smart contract code: Check the event definition in Solidity code, identify indexed parameters and the event signature, then obtain topic values via Keccak256 hashing.
                            > - Using a block explorer: Select a sample transaction to trace, go to the transaction details, and find topic values in sections such as "Logs". Below is an example view from Etherscan (https://etherscan.io) for USDC (ERC20) Transfer event logs.
                          minItems: 1
                          maxItems: 4
                          items:
                            type: string
                            default: "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"
                            example:
                              - "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"
                              - "0x000000000000000000000000b7aa2d3c833a6827c4f39bef9622d7cddf66b7e7"
                              - "0x0000000000000000000000003264039cfaa37a70a0e8ccfbf4b7e60bedce5c9f"
