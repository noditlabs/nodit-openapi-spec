  /{chain}/{network}/blockchain/getTransactionsInBlock:
    post:
      security:
        - api_key: []
      operationId: tron-getTransactionsInBlock
      summary: Get Transactions In Block
      description: |+
        Retrieves the list of transactions within a specific block.


        > 🚧 Caution when using decodeInput
        >
        > The decodeInput field decodes the transaction's input field and provides the result. However, different functions can use the same function selector, so the provided result may not match the actually called function. Therefore, additional verification is recommended for functions that differ from ERC standard specifications.

      x-seo-description: Retrieve all transactions included in a specific block, identified by hash or block number.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - tron
            default: tron
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - block
                  properties:
                    block:
                      type: string
                      description: |-
                        Parameter specifying the point in time for balance query. You can enter block hash, block number, or block tag.
                        - block number: Enter as a decimal string.
                        - block hash: Enter as a 64-character hexadecimal string, excluding the 0x prefix.
                        - block tag: Enter "earliest" or "latest"; "latest" queries the balance of the most recent block.
                      pattern: ^[0-9]+$|^[0-9a-fA-F]{64}|latest|earliest
                      default: latest
                      example: latest
                - type: object
                  properties:
                    page:
                      type: integer
                      description: |-
                        The page parameter specifies the data page to query. It accepts values up to 100; for pages exceeding 100, use the cursor pagination method.

                        The page and cursor parameters cannot be used together. If both page and cursor are empty, cursor pagination is used.
                      pattern: ^(?:[1-9][0-9]?|100)$
                    rpp:
                      type: integer
                      description: rpp stands for results per page and specifies the page size. You can specify a number greater than 0 and up to 100.
                      pattern: ^(?:[1-9][0-9]{0,2}?|100)$
                    cursor:
                      type: string
                      description: |-
                        The cursor parameter supports pagination and data navigation between pages. Provide the cursor value from the previous page in the next request to load the next page of data.

                        The page and cursor parameters cannot be used together. If both page and cursor are empty, cursor pagination is used.
                    withCount:
                      type: boolean
                      description: Parameter specifying whether to include the count field in the response. The count field indicates the total number of requested data items. When set to true, the count field is included and response speed may be slower.
                      default: false
                - type: object
                  properties:
                    withLogs:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsByHashes/post/requestBody/content/application~1json/schema/properties/withLogs"
                    withDecode:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsByHashes/post/requestBody/content/application~1json/schema/properties/withDecode"
            example:
              block: "17530000"
              withLogs: false
              withDecode: false
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - items
                    properties:
                      page:
                        type: integer
                        description: Field representing the page number specified in the page parameter. This field is only included in the response when a value greater than 0 is specified for the page parameter.
                      rpp:
                        type: integer
                        description: Field representing the number of results per page specified in the rpp parameter.
                      cursor:
                        type: string
                        description: A field for cursor pagination. This value must be provided in the next request to load the next page of data.
                      count:
                        type: integer
                        description: Field representing the total count of requested data. This field is only included in the response when true is set for the withCount parameter.
                      items:
                        type: array
                        description: Field representing the list of queried data.
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsByHashes/post/responses/200/content/application~1json/schema/items"
                            - type: object
                              properties:
                                logs:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - contractAddress
                                      - transactionHash
                                      - transactionIndex
                                      - blockNumber
                                      - data
                                      - logIndex
                                      - topics
                                    properties:
                                      contractAddress:
                                        type: string
                                        description: Represents the address of the smart contract where the event occurred. This serves as the identifier for the contract that emitted the event. This field has a 34-character base58 string format starting with "T".
                                      transactionHash:
                                        type: string
                                        description: Unique hash of the transaction in which this log occurred. This field has a 64-character hexadecimal string format excluding the prefix (0x).
                                      transactionIndex:
                                        type: integer
                                        description: Indicates the index of the transaction (within the block) in which the log occurred. Identifies the position among multiple transactions in the same block.
                                      blockNumber:
                                        type: integer
                                        description: Indicates the block number that contains the log. Used to identify the block where the log is stored.
                                      data:
                                        type: string
                                        description: Field containing additional information related to the event. Returns non-indexed data from the event log; indexed values are returned in the topics field.
                                      logIndex:
                                        type: integer
                                        description: Indicates the index of the log within the block. Identifies the position of a specific log among multiple logs in the block.
                                      topics:
                                        type: array
                                        description: Array of topics describing the log event. Each topic describes key attributes of the event, and indexed fields are returned here. Non-indexed fields are returned in data.
                                        items:
                                          type: string
                                      decodedLog:
                                        type: object
                                        description: |-
                                          Provides decoded information according to the smart contract's event definition, with the following sub-fields.
                                          <strong style='color: red;'>*</strong> This field is only provided when withDecode is true.
                                        properties:
                                          name:
                                            type: string
                                            description: Represents the name of the event.
                                          eventFragment:
                                            type: string
                                            description: The event fragment or simplified form of the signature.
                                          signature:
                                            type: string
                                            description: Full signature of the event, representing the structure of the event. This field includes the event name and argument types.
                                          eventHash:
                                            type: string
                                            description: Unique hash value of the event, used as a key to identify the event. This value is generated by hashing the event signature with the Keccak-256 hash function.
                                          args:
                                            type: array
                                            description: List of arguments passed to the event. For example, a Transfer event includes sender (from), recipient (to), value, etc.
                                            items:
                                              type: object
                                              properties:
                                                name:
                                                  type: string
                                                  description: Represents the name of the event argument.
                                                type:
                                                  type: string
                                                  description: Represents the data type of the event argument.
                                                value:
                                                  type: string
                                                  description: Represents the value of the event argument.
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "408":
          $ref: "#/components/responses/408"
        "409":
          $ref: "#/components/responses/409"
        "413":
          $ref: "#/components/responses/413"
        "414":
          $ref: "#/components/responses/414"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
