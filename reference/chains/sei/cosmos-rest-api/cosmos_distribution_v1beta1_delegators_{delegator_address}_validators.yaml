openapi: 3.1.0
info:
  title: SEI - cosmos_distribution_v1beta1_delegators_{delegator_address}_validators
  version: 1.0.0
servers:
  - url: https://rest-sei-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /cosmos/distribution/v1beta1/delegators/{delegator_address}/validators:
    get:
      description: Retrieves the list of validators for the delegator.
      operationId: cosmos_distribution_v1beta1_delegators_{delegator_address}_validators
      tags:
        - distribution
      responses:
        "200":
          description: Successful Response
          content:
            "*/*":
              schema:
                type: object
                properties:
                  validators:
                    type: array
                    items:
                      type: string
                    description: List of validators to which the delegator has delegated.
                description: |-
                  QueryDelegatorValidatorsResponse is the response type for the
                  Query/DelegatorValidators RPC method.
        default:
          description: An unexpected error response.
          content:
            "*/*":
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: integer
                    format: int32
                  message:
                    type: string
                  details:
                    type: array
                    items:
                      type: object
                      properties:
                        type_url:
                          type: string
                        value:
                          type: string
                          format: byte
      parameters:
        - name: delegator_address
          description: delegator_addr defines the delegator address to query for.
          in: path
          required: true
          schema:
            type: string
      security:
        - api_key: []
      summary: /cosmos/distribution/v1beta1/delegators/{delegator_address}/validators
