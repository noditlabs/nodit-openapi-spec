openapi: 3.1.0
info:
  title: SEI - GenesisChunked
  version: 1.0.0
servers:
  - url: https://rpc-sei-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /genesis_chunked:
    get:
      security:
        - api_key: []
      operationId: genesis_chunked
      summary: GenesisChunked
      description: Retrieves a large genesis document in chunks.
      tags:
        - rest-api
      parameters:
        - name: chunk
          in: query
          required: true
          description: Chunk index to retrieve.
          schema:
            type: integer
          example: 0
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - jsonrpc
                  - id
                  - result
                properties:
                  jsonrpc:
                    type: string
                    const: "2.0"
                  id:
                    type: integer
                  result:
                    type: object
                    additionalProperties: false
                    properties:
                      chunk:
                        type: integer
                      total:
                        type: integer
                      data:
                        type: string
              example:
                jsonrpc: "2.0"
                id: 1
                result:
                  chunk: 0
                  total: 3
                  data: eyJnZW5lc2lzX3RpbWUiOiIyMDE5LTEyLTExVDE2OjExOjM0WiIsImNoYWluX2lkIjoiY29zbW9zaHViLTQifQ==
