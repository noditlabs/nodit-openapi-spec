  /{chain}/{network}/blockchain/getUnspentTransactionOutputsByAccount:
    post:
      security:
        - api_key: []
      operationId: dogecoin-getUnspentTransactionOutputsByAccount
      summary: Get Unspent Transaction Outputs By Account
      description: |
        Retrieves the list of UTXOs (Unspent Transaction Outputs) for a specific account.
      x-seo-description: Get unspent transaction outputs (UTXOs) associated with a specific account address.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - dogecoin
            default: dogecoin
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - accountAddress
                  properties:
                    accountAddress:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTotalTransactionCountByAccount/post/requestBody/content/application~1json/schema/properties/accountAddress"
                - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsByAccount/post/requestBody/content/application~1json/schema/allOf/1"
            example:
              accountAddress: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionsByAccount/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          required:
                            - transactionId
                            - voutIndex
                            - address
                            - value
                            - blockHeight
                            - blockHash
                            - blockTimestamp
                          example:
                            transactionId: 6b1e04c59a1e42d30af4cdac20e1a9e4d22e947b
                            voutIndex: 1
                            address: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa
                            value: 5000000000
                            blockHeight: 100000
                            blockHash: 0000000000000000000a8ed7f3e6c1c2d21cbb5f
                            blockTimestamp: 1400000000
                          properties:
                            transactionId:
                              type: string
                              description: Unique identifier of the transaction in which the UTXO was created. A unique hash value calculated from transaction data; uniquely identifies the transaction.
                              example: 6b1e04c59a1e42d30af4cdac20e1a9e4d22e947b
                            voutIndex:
                              type: integer
                              description: Output (Vout) index of the transaction in which the UTXO was created. Indicates which output in the transaction output array; starts at 0.
                              example: 1
                            address:
                              type: string
                              description: Address that received the transaction output. The recipient owns the UTXO using this address; follows P2PKH, P2SH, Bech32, or Bech32m format.
                              example: 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa
                            value:
                              type: string
                              description: Value of the UTXO; represents the balance of the transaction output. Value is expressed in satoshis; 1 BTC = 100,000,000 satoshis.
                              example: 5000000000
                            blockHeight:
                              type: integer
                              description: Indicates the height of the block containing the UTXO. Integer value representing the order of this block in the blockchain.
                              example: 100000
                            blockHash:
                              type: string
                              description: Hash value of the block containing the UTXO. A unique 64-character hexadecimal value generated by the SHA-256 algorithm; uniquely identifies the block.
                              example: 0000000000000000000a8ed7f3e6c1c2d21cbb5f
                            blockTimestamp:
                              type: integer
                              description: Indicates when the block containing the UTXO was created. Value in UNIX timestamp format (in seconds); represents when the block was created.
                              example: 1400000000
