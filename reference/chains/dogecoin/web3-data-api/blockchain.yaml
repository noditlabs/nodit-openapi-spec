                          value: "0.00016400"
                          scriptPubKey:
                            hex: 21025ac17459519db3146065c5a1738cd45315c38951e978d792492a6633c9cd6e75ac
                            asm: 025ac17459519db3146065c5a1738cd45315c38951e978d792492a6633c9cd6e75 OP_CHECKSIG
                            type: pubkey
