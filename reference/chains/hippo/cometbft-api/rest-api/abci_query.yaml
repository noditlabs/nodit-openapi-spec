openapi: 3.1.0
info:
  title: Hippo - ABCIQuery
  version: 1.0.0
servers:
  - url: https://rpc-hippo-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /abci_query:
    get:
      security:
        - api_key: []
      operationId: abci_query
      summary: ABCIQuery
      description: Queries the application with a specific path and data.
      tags:
        - rest-api
      parameters:
        - name: path
          in: query
          description: Application request path.
          schema:
            type: string
          example: /store/foo/key
        - name: data
          in: query
          description: Hex-encoded serialized byte data.
          schema:
            type: string
          example: 636f6d6574626674
        - name: height
          in: query
          description: Block height for the query.
          schema:
            type: string
          example: "1"
        - name: prove
          in: query
          description: String boolean indicating whether to include proof.
          schema:
            type: string
          example: "true"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - jsonrpc
                  - id
                  - result
                properties:
                  jsonrpc:
                    type: string
                    const: "2.0"
                  id:
                    type: integer
                  error:
                    type: string
                  result:
                    type: object
                    additionalProperties: false
                    properties:
                      response:
                        type: object
                        additionalProperties: false
                        properties:
                          log:
                            type: string
                          height:
                            type: string
                          proof:
                            type: string
                          key:
                            type: string
                          value:
                            type: string
                          index:
                            type: string
                          code:
                            type: string
              example:
                jsonrpc: "2.0"
                id: 1
                result:
                  response:
                    log: exists
                    height: "1"
                    proof: CgMIARIFCgNmb28=
                    key: Zm9v
                    value: YmFy
                    index: "0"
                    code: "0"
