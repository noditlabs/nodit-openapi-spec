                      timestamp:
                        type: string
                        description: |-
                          Time of the previous block. For heights > 1, it's the weighted median of
                          the timestamps of the valid votes in the block.LastCommit. For height == 1,
                          it's genesis time.
                      events:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                            attributes:
                              type: array
                              items:
                                type: object
                                properties:
                                  key:
                                    type: string
                                  value:
                                    type: string
                                  index:
                                    type: boolean
                                description: EventAttribute is a single key-value pair, associated with an event.
                          description: |-
                            Event allows application developers to attach additional information to
                            ResponseFinalizeBlock and ResponseCheckTx.
                            Later, transactions may be queried using these events.
                        description: All events emitted during transaction processing. Includes events from all message processing and ante execution. Logs contain only events emitted during message processing, plus additional metadata.
                    description: |-
                      TxResponse defines a structure containing relevant tx data and metadata. The
                      tags are stringified and the log is JSON decoded.
                description: |-
                  BroadcastTxResponse is the response type for the
