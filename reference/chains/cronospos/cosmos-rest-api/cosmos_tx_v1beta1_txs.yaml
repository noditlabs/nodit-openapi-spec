                        representation, that representation will be embedded adding a field
                        `value` which holds the custom JSON in addition to the `@type`
                        field. Example (for message [google.protobuf.Duration][]):

                            {
                              "@type": "type.googleapis.com/google.protobuf.Duration",
                              "value": "1.212s"
                            }
      parameters:
        - name: events
          description: |-
            events is the list of transaction event type.
            Deprecated post v0.47.x: use query instead, which should contain a valid
            events query.
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: pagination.key
          description: |-
            key is a value returned in PageResponse.next_key to begin
            querying the next page most efficiently. Only one of offset or key
            should be set.
          in: query
          required: false
          schema:
            type: string
            format: byte
        - name: pagination.offset
          description: |-
            offset is a numeric offset that can be used when key is unavailable.
            It is less efficient than using key. Only one of offset or key should
            be set.
          in: query
          required: false
          schema:
            type: string
            format: uint64
        - name: pagination.limit
          description: |-
            limit is the total number of results to be returned in the result page.
            If left empty it will default to a value to be set by each app.
          in: query
          required: false
          schema:
            type: string
            format: uint64
        - name: pagination.count_total
          description: |-
            count_total is set to true  to indicate that the result set should include
            a count of the total number of items available for pagination in UIs.
            count_total is only respected when offset is used. It is ignored when key
            is set.
          in: query
          required: false
          schema:
            type: boolean
        - name: pagination.reverse
          description: Set to true to return results in descending order.
          in: query
          required: false
          schema:
            type: boolean
        - name: order_by
          description: |-
            - ORDER_BY_UNSPECIFIED: ORDER_BY_UNSPECIFIED specifies an unknown sorting order. OrderBy defaults
            to ASC in this case.
             - ORDER_BY_ASC: ORDER_BY_ASC defines ascending order
             - ORDER_BY_DESC: ORDER_BY_DESC defines descending order
          in: query
          required: false
          schema:
            type: string
            enum:
              - ORDER_BY_UNSPECIFIED
              - ORDER_BY_ASC
              - ORDER_BY_DESC
            default: ORDER_BY_UNSPECIFIED
        - name: page
          description: |-
            page is the page number to query, starts at 1. If not provided, will
            default to first page.
          in: query
          required: false
          schema:
            type: string
            format: uint64
        - name: limit
          description: |-
            limit is the total number of results to be returned in the result page.
            If left empty it will default to a value to be set by each app.
          in: query
          required: false
          schema:
            type: string
            format: uint64
        - name: query
          description: |-
            query defines the transaction event query that is proxied to Tendermint's
            TxSearch RPC method. The query must be valid.

            Since cosmos-sdk 0.50
          in: query
          required: false
          schema:
            type: string
      security:
        - api_key: []
      summary: /cosmos/tx/v1beta1/txs
    post:
      description: BroadcastTx broadcast transaction.
      operationId: cosmos_tx_v1beta1_txs
      tags:
        - tx
      responses:
        "200":
          description: Successful Response
          content:
            "*/*":
              schema:
                type: object
                properties:
                  tx_response:
                    type: object
                    properties:
                      height:
                        type: string
                        format: int64
                        title: The block height
                      txhash:
                        type: string
                        description: The transaction hash.
                      codespace:
                        type: string
                        title: Namespace for the Code
                      code:
                        type: integer
                        format: int64
                        description: Response code.
                      data:
                        type: string
                        description: Result bytes, if any.
                      raw_log:
                        type: string
                        description: |-
                          The output of the application's logger (raw string). May be
                          non-deterministic.
                      logs:
                        type: array
                        items:
                          type: object
                          properties:
                            msg_index:
                              type: integer
                              format: int64
                            log:
                              type: string
                            events:
                              type: array
                              items:
                                type: object
                                properties:
                                  type:
                                    type: string
                                  attributes:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        key:
                                          type: string
                                        value:
                                          type: string
                                      description: |-
                                        Attribute defines an attribute wrapper where the key and value are
                                        strings instead of raw bytes.
                                description: |-
                                  StringEvent defines en Event object wrapper where all the attributes
                                  contain key/value pairs that are strings instead of raw bytes.
                              description: |-
                                Events contains a slice of Event objects that were emitted during some
                                execution.
                          description: ABCIMessageLog defines a structure containing an indexed tx ABCI message log.
                        description: The output of the application's logger (typed). May be non-deterministic.
                      info:
                        type: string
                        description: Additional information. May be non-deterministic.
                      gas_wanted:
                        type: string
                        format: int64
                        description: Amount of gas requested for transaction.
                      gas_used:
                        type: string
                        format: int64
                        description: Amount of gas consumed by transaction.
                      tx:
                        type: object
                        properties:
                          type_url:
                            type: string
