openapi: 3.1.0
info:
  title: CronosPOS - Header By Hash
  version: 1.0.0
servers:
  - url: https://rpc-cronospos-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /:
    post:
      security:
        - api_key: []
      operationId: header_by_hash
      summary: Header By Hash
      description: Retrieves the header of a specific block by its hash.
      tags:
        - json-rpc-api
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - jsonrpc
                - id
                - method
              properties:
                jsonrpc:
                  type: string
                  const: "2.0"
                id:
                  type: integer
                method:
                  type: string
                  const: header_by_hash
                params:
                  type: object
                  additionalProperties: false
                  required:
                    - hash
                  properties:
                    hash:
                      type: string
                      description: Block hash to query.
            example:
              jsonrpc: "2.0"
              id: 1
              method: header_by_hash
              params:
                hash: "0xD70952032620CC4E2737EB8AC379806359D8E0B17B0488F627997A0B043ABDED"
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - jsonrpc
                  - id
                  - result
                properties:
                  jsonrpc:
                    type: string
                    const: "2.0"
                  id:
                    type: integer
                  result:
                    type: object
                    additionalProperties: false
                    properties:
                      header:
                        type: object
                        additionalProperties: false
                        properties:
                          version:
                            type: object
                            additionalProperties: false
                            properties:
                              block:
                                type: string
                              app:
                                type: string
                          chain_id:
                            type: string
                          height:
                            type: string
                          time:
                            type: string
                          last_block_id:
                            type: object
                            additionalProperties: false
                            properties:
                              hash:
                                type: string
                              parts:
                                type: object
                                additionalProperties: false
                                properties:
                                  total:
                                    type: integer
                                  hash:
                                    type: string
                          last_commit_hash:
                            type: string
                          data_hash:
                            type: string
                          validators_hash:
                            type: string
                          next_validators_hash:
                            type: string
                          consensus_hash:
                            type: string
                          app_hash:
                            type: string
                          last_results_hash:
                            type: string
                          evidence_hash:
                            type: string
                          proposer_address:
                            type: string
              example:
                jsonrpc: "2.0"
                id: 1
                result:
                  header:
                    version:
                      block: "11"
                      app: "0"
                    chain_id: cosmoshub-4
                    height: "1000"
                    time: "2019-12-11T16:11:34Z"
                    last_block_id:
                      hash: A1B2C3D4E5F6A7B8C9D0E1F2A3B4C5D6E7F8A9B0C1D2E3F4A5B6C7D8E9F0A1B2
                      parts:
                        total: 1
                        hash: B2C3D4E5F6A7B8C9D0E1F2A3B4C5D6E7F8A9B0C1D2E3F4A5B6C7D8E9F0A1B2C3
                    last_commit_hash: E3B0C44298FC1C149AFBF4C8996FB92427AE41E4649B934CA495991B7852B855
                    data_hash: 970886F99E77ED0D60DA8FCE0447C2676E59F2F77302B0C4AA10E1D02F18EF73
                    validators_hash: 8B4640A28F07F7F4D9D5C7F4A7A2FBE8E1E5C3A1D2B3C4D5E6F7A8B9C0D1E2F3
                    next_validators_hash: 8B4640A28F07F7F4D9D5C7F4A7A2FBE8E1E5C3A1D2B3C4D5E6F7A8B9C0D1E2F3
                    consensus_hash: 048091BC7DDC283F77BFBF91D73C44DA58C3DF8A9CBC867405D8B7F3DAADA22F
                    app_hash: 223BF64D4A01074DC523A80E76B9BBC786C791FB0A1893AC5B14866356FCFD6C
                    last_results_hash: E3B0C44298FC1C149AFBF4C8996FB92427AE41E4649B934CA495991B7852B855
                    evidence_hash: E3B0C44298FC1C149AFBF4C8996FB92427AE41E4649B934CA495991B7852B855
                    proposer_address: D70952032620CC4E2737EB8AC379806359D8E0B1
