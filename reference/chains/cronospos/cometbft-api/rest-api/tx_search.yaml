openapi: 3.1.0
info:
  title: CronosPOS - Tx Search
  version: 1.0.0
servers:
  - url: https://rpc-cronospos-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /tx_search:
    get:
      security:
        - api_key: []
      operationId: tx_search
      summary: Tx Search
      description: Searches for transactions matching the query conditions.
      tags:
        - rest-api
      parameters:
        - name: query
          in: query
          required: true
          description: Transaction search query string.
          schema:
            type: string
          example: tx.height=1000
        - name: prove
          in: query
          description: String boolean indicating whether to include the transaction's block inclusion proof in the result.
          schema:
            type: string
          example: "false"
        - name: page
          in: query
          description: Page number (starting from 1).
          schema:
            type: string
          example: "1"
        - name: per_page
          in: query
          description: Number of items to return per page (maximum 100).
          schema:
            type: string
          example: "30"
        - name: order_by
          in: query
          description: Sort order. "asc" or "desc". Defaults to the default sort order if omitted.
          schema:
            type: string
          example: asc
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - jsonrpc
                  - id
                  - result
                properties:
                  jsonrpc:
                    type: string
                    const: "2.0"
                  id:
                    type: integer
                  result:
                    type: object
                    additionalProperties: false
                    required:
                      - txs
                      - total_count
                    properties:
                      txs:
                        type: array
                        items:
                          type: object
                          additionalProperties: false
                          properties:
                            hash:
                              type: string
                            height:
                              type: string
                            index:
                              type: integer
                            tx_result:
                              type: object
                              additionalProperties: false
                              properties:
                                log:
                                  type: string
                                gas_wanted:
                                  type: string
                                gas_used:
                                  type: string
                                tags:
                                  type: array
                                  items:
                                    type: object
                                    additionalProperties: false
                                    properties:
                                      key:
                                        type: string
                                      value:
                                        type: string
                                      index:
                                        type: boolean
                            tx:
                              type: string
                            proof:
                              type: object
                              additionalProperties: false
                              properties:
                                RootHash:
                                  type: string
                                Data:
                                  type: string
                                Proof:
                                  type: object
                                  additionalProperties: false
                                  properties:
                                    total:
                                      type: string
                                    index:
                                      type: string
                                    leaf_hash:
                                      type: string
                                    aunts:
                                      type: array
                                      items:
                                        type: string
                      total_count:
                        type: string
              example:
                jsonrpc: "2.0"
                id: 1
                result:
                  txs:
                    - hash: D70952032620CC4E2737EB8AC379806359D8E0B17B0488F627997A0B043ABDED
                      height: "1000"
                      index: 0
                      tx_result:
                        log: "[{\"msg_index\":\"0\",\"success\":true,\"log\":\"\"}]"
                        gas_wanted: "200000"
                        gas_used: "28596"
                        tags:
                          - key: action
                            value: send
                            index: true
                      tx: a/encoded_tx/c
                  total_count: "1"
