openapi: 3.1.0
info:
  title: CronosPOS - Health
  version: 1.0.0
servers:
  - url: https://rpc-cronospos-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /health:
    get:
      security:
        - api_key: []
      operationId: health
      summary: Health
      description: Retrieves the node's heartbeat status.
      tags:
        - rest-api
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - jsonrpc
                  - id
                  - result
                properties:
                  jsonrpc:
                    type: string
                    const: "2.0"
                  id:
                    type: integer
                  result:
                    type: object
                    additionalProperties: false
              example:
                jsonrpc: "2.0"
                id: 1
                result: {}
