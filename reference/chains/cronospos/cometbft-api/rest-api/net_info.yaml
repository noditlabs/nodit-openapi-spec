openapi: 3.1.0
info:
  title: CronosPOS - NetInfo
  version: 1.0.0
servers:
  - url: https://rpc-cronospos-mainnet.nodit.io
components:
  securitySchemes:
    api_key:
      type: apiKey
      name: X-API-KEY
      in: header
      x-default: nodit-demo
      description: |
        The example value `nodit-demo` is for use in the developer documentation only.
        For real applications or services, please use the API key issued from the Nodit console.
paths:
  /net_info:
    get:
      security:
        - api_key: []
      operationId: net_info
      summary: NetInfo
      description: Retrieves network information.
      tags:
        - rest-api
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - jsonrpc
                  - id
                  - result
                properties:
                  jsonrpc:
                    type: string
                    const: "2.0"
                  id:
                    type: integer
                  result:
                    type: object
                    additionalProperties: false
                    properties:
                      listening:
                        type: boolean
                      listeners:
                        type: array
                        items:
                          type: string
                      n_peers:
                        type: string
                      peers:
                        type: array
                        items:
                          type: object
                          additionalProperties: false
                          properties:
                            node_id:
                              type: string
                            url:
                              type: string
              example:
                jsonrpc: "2.0"
                id: 1
                result:
                  listening: true
                  listeners:
                    - Listener(@)
                  n_peers: "2"
                  peers:
                    - node_id: a8019df80d3d32e770e5b32cf98c68b6b16d1a1
                      url: tcp://a8019df80d3d32e770e5b32cf98c68b6b16d1a1@192.168.0.1:26656
                    - node_id: b9129ef91e4e43f881f6c43df99d7c7c27e2b2b
                      url: tcp://b9129ef91e4e43f881f6c43df99d7c7c27e2b2b@192.168.0.2:26656
