  /{chain}/{network}/blockchain/getTransactionsByHashes:
    post:
      security:
        - api_key: []
      operationId: xrpl-getTransactionsByHashes
      summary: Get Transactions By Hashes
      description: |+
        Retrieves information for multiple transactions. Up to 1,000 transactions can be queried.


        > 🚧 Getting a 429 error? Check your subscription plan!
        > A 429 error may occur when the throughput limit of your subscribed plan is exceeded.
        > For example, the Starter plan has a limit of 300 CU per second, so calling an API that consumes 350 CU while on the Starter plan may result in a 429 error.
        > Check the CU consumption of the API you are using on the Compute Unit Costs page, and consider upgrading to a higher plan if you need more throughput!
        > 👉 [Go to Compute Unit Costs page](/guides/compute-unit)

      x-seo-description: Retrieve detailed data for multiple transactions in a single request using their hashes.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - xrpl
            default: xrpl
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - transactionHashes
              properties:
                transactionHashes:
                  type: array
                  items:
                    $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/transactionHash"
                withBalanceChanges:
                  $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/withBalanceChanges"
                withTokenTransfers:
                  $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/withTokenTransfers"
            example:
              transactionHashes:
                - C466ACB9B54128A433E7FC9EFA49030A547AA06F40A3508BA90EF9D5984BADC3
                - A14DE85FA752026D5EE591BE0C99B5BC2814CD8FBE744A07EC0BC430254C34DA
              withBalanceChanges: false
              withTokenTransfers: false
      responses:
        "200":
          description: Successful Response
          content:
