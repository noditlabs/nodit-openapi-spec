  /{chain}/{network}/nft/getNftMetadataByTokenIds:
    post:
      security:
        - api_key: []
      operationId: arbitrum-getNftMetadataByTokenIds
      summary: Get NFT Metadata by Token IDs
      description: |+
        Retrieves metadata for specific NFTs. Multiple NFTs can be queried, up to a maximum of 100 NFTs.


        > 📘 What are NFT Metadata and Token URI?
        >
        > NFTs are a technology that ensures ownership and uniqueness of digital assets. NFT metadata is a critical component that stores information about these assets. Metadata plays an important role in describing the essence of an NFT.
        > 1. NFT Metadata
        > Includes the NFT's creator, issuance date, attributes, and media files (e.g., images, videos). This metadata makes an NFT more than just a digital file—it defines a unique asset and establishes the NFT's scarcity or distinctive characteristics.
        > 2. Token URI
        > Storing data on the blockchain is costly. Therefore, metadata and media files are not stored on the blockchain but are kept in external storage such as IPFS or S3. Token URI is a field that points to the location of the metadata file in such external storage. Metadata is accessed via this URI. In other words, Token URI links metadata and media files, serving as the bridge between on-chain information and actual content.

      x-seo-description: Retrieve metadata for specific NFTs using contract address and token IDs in a single request.
      tags:
        - NFT API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arbitrum
            default: arbitrum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tokens
              properties:
                tokens:
                  type: array
                  description: List of NFTs to query. Up to 100 NFTs can be queried.
                  items:
                    type: object
                    required:
                      - contractAddress
                      - tokenId
                    properties:
                      contractAddress:
                        $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftHoldersByTokenId/post/requestBody/content/application~1json/schema/allOf/0/properties/contractAddress"
                      tokenId:
                        $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftHoldersByTokenId/post/requestBody/content/application~1json/schema/allOf/0/properties/tokenId"
            example:
              tokens:
                - contractAddress: "0xBC4CA0EdA7647A8aB7C2061c2E118A18a936f13D"
                  tokenId: "1"
                - contractAddress: "0xBC4CA0EdA7647A8aB7C2061c2E118A18a936f13D"
                  tokenId: "2"
