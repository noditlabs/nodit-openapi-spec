    post:
      security:
        - api_key: []
      operationId: arbitrum-getNftTransfersByAccount
      summary: Get NFT Transfers By Account
      description: |+
        Retrieves the list of NFT transfers sent or received by a specific address. Results include contract metadata and NFT metadata.

      x-seo-description: Get a paginated list of NFT transfers sent or received by a specific account address.
      tags:
        - NFT API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arbitrum
            default: arbitrum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - accountAddress
                  properties:
                    accountAddress:
                      $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/requestBody/content/application~1json/schema/allOf/0/properties/accountAddress"
                    relation:
                      type: string
                      description: |-
                        Parameter for filtering transactions where the queried account address is the sender or recipient.
                        - from: Filter by sender only.
                        - to: Filter by recipient only.
                        - both (default): Returns all transactions where the queried address appears in from or to.
                      enum:
                        - from
                        - to
                        - both
                      pattern: from|to|both
                      default: both
                    contractAddresses:
                      $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftContractMetadataByContracts/post/requestBody/content/application~1json/schema/properties/contractAddresses"
                    fromBlock:
                      type: string
                      description: |
                        Parameter specifying the starting block for the query. You can enter one of the following formats:
                        - block number: Enter block number as a decimal string.
                        - block hash: 64-character hexadecimal (including "0x").
                        - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                        Notes:
                        - This field cannot be used together with `fromDate` and `toDate`.
                        - If provided without fromBlock, results are queried from genesis block to this block.
                        - toBlock value cannot be less than fromBlock value.
                        - If fromBlock and toBlock have the same value, only that block is queried.
                        - "earliest" for toBlock is only allowed when fromBlock is "earliest".
                        - If `fromBlock` and `toBlock` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    toBlock:
                      type: string
                      description: |-
                        Parameter specifying the ending block for the query. You can enter one of the following formats:
                        - block number: Enter block number as a decimal string.
                        - block hash: 64-character hexadecimal (including "0x").
                        - block tag: Use "earliest" or "latest" to specify the first block or the most recent block.

                        Notes:
                        - This field cannot be used together with `fromDate` and `toDate`.
                        - If provided without fromBlock, results are queried from genesis block to this block.
                        - toBlock value cannot be less than fromBlock value.
                        - If fromBlock and toBlock have the same value, only that block is queried.
                        - "earliest" for toBlock is only allowed when fromBlock is "earliest".
                        - If `fromBlock` and `toBlock` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]+$|^0[xX][0-9a-fA-F]{64}|latest|earliest
                    fromDate:
                      type: string
                      description: |-
                        Parameter specifying the start date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                        Notes:
                        - If provided without toDate, results are queried from this date to the latest block.
                        - fromDate value must be equal to or earlier than toDate value.
                        - If fromDate and toDate have the same value, only blocks from that date are queried.
                        - This field cannot be used together with fromBlock and toBlock.  
                        - If `fromDate` and `toDate` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                      example: "2025-01-01T00:00:00+00:00"
                    toDate:
                      type: string
                      description: |-
                        Parameter specifying the end date for the query. Date must follow ISO 8601 format (YYYY-MM-DDThh:mm:ss{time zone}) including seconds.

                        Notes:
                        - If provided without fromDate, results are queried from genesis block to this date.
                        - toDate value must be equal to or later than fromDate value.
                        - If fromDate and toDate have the same value, only blocks from that date are queried.
                        - This field cannot be used together with fromBlock and toBlock.  
                        - If `fromDate` and `toDate` are not provided, the API queries data from the latest 30 days.
                      pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}(?:\.[0-9]{1,3})?(?:Z|[+-][0-9]{2}:[0-9]{2})$
                      example: "2025-01-31T00:00:00+00:00"
                - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/requestBody/content/application~1json/schema/allOf/1"
                - type: object
                  properties:
                    withMetadata:
                      $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/requestBody/content/application~1json/schema/allOf/2/properties/withMetadata"
                    withZeroValue:
                      type: boolean
                      description: Parameter specifying whether to include results with value 0 in the response. Set to true for faster responses.
                      default: false
                    withFunction:
                      type: boolean
                      description: Parameter specifying whether to include the function field in the response. Response speed may be slower when set to true.
                      default: false
            example:
              accountAddress: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e"
              fromDate: "2026-01-01T00:00:00Z"
              toDate: "2026-02-01T00:00:00Z"
              page: 1
              rpp: 10
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - type: object
                              required:
                                - from
                                - to
                                - value
                                - timestamp
                                - blockNumber
                                - transactionHash
                                - logIndex
                              properties:
                                from:
                                  type: string
                                  description: A field representing the address from which the token was transferred. Provided as a 40-character hexadecimal string prefixed with 0x.
                                to:
                                  type: string
                                  description: A field representing the address that received the token. Provided as a 40-character hexadecimal string prefixed with 0x.
                                value:
                                  type: string
                                  description: A field representing the amount of tokens transferred. Provided in decimal string format.
                                timestamp:
                                  type: integer
                                  description: A field representing when the token transfer occurred. This field is provided as a UNIX timestamp.
                                blockNumber:
                                  type: integer
                                  description: A field representing the block number where the token transfer occurred.
                                transactionHash:
                                  type: string
                                  description: A field representing the hash of the token transfer transaction. Provided as a 64-character hexadecimal string prefixed with 0x.
                                logIndex:
                                  type: integer
                                  description: A field representing the log index of the token transfer transaction. Indicates the order of events in the transaction.
                                batchIndex:
                                  type: integer
                                  description: A field representing the batch index of the token transfer transaction. This field is included only in responses for ERC1155 token transfers.
                                function:
                                  type: object
                                  description: A field representing the information of the function called in a transaction containing a Transfer. This field is included in the response only when the withFunction parameter is set to true.
                                  required:
                                    - selector
                                    - input
                                  properties:
                                    selector:
                                      type: string
                                      description: A 4-byte function selector value that identifies the called function. The function selector is the first 4 bytes of the Keccak-256 hash of the function signature. Provided as an 8-character hexadecimal string prefixed with 0x.
                                    name:
                                      type: string
                                      description: A field representing the name of the called function.
                                    signature:
                                      type: string
                                      description: "A field representing the signature of the called function. "
                                    args:
                                      type: array
                                      description: A field representing the arguments of the called function.
                                      items:
                                        type: object
                                        properties:
                                          name:
                                            type: string
                                            description: A field representing the name of the argument.
                                          type:
                                            type: string
                                            description: A field representing the type of the argument.
                                          value:
                                            type: string
                                            description: A field representing the value of the argument.
                                    input:
                                      type: string
                                      description: A field representing the input data of the function. Provided as a hexadecimal string prefixed with 0x.
                            - type: object
                              properties:
                                contract:
                                  allOf:
                                    - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftContractMetadataByContracts/post/responses/200/content/application~1json/schema/items/allOf/0"
                                    - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftContractMetadataByContracts/post/responses/200/content/application~1json/schema/items/allOf/1"
                                nft:
                                  $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/responses/200/content/application~1json/schema/allOf/1/properties/items/items/allOf/1"
