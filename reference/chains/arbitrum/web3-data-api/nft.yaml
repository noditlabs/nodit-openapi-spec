  /{chain}/{network}/nft/getNftsOwnedByAccount:
    post:
      security:
        - api_key: []
      operationId: arbitrum-getNftsOwnedByAccount
      summary: Get NFTs Owned By Account
      description: |+
        Retrieves the list of NFTs held by a specific account. Results include the quantity held per token and token metadata.


        > 📘 What are NFT Metadata and Token URI?
        >
        > NFTs are a technology that ensures ownership and uniqueness of digital assets. NFT metadata is a critical component that stores information about these assets. Metadata plays an important role in describing the essence of an NFT.
        > 1. NFT Metadata
        > Includes the NFT's creator, issuance date, attributes, and media files (e.g., images, videos). This metadata makes an NFT more than just a digital file—it defines a unique asset and establishes the NFT's scarcity or distinctive characteristics.
        > 2. Token URI
        > Storing data on the blockchain is costly. Therefore, metadata and media files are not stored on the blockchain but are kept in external storage such as IPFS or S3. Token URI is a field that points to the location of the metadata file in such external storage. Metadata is accessed via this URI. In other words, Token URI links metadata and media files, serving as the bridge between on-chain information and actual content.

      x-seo-description: Retrieve all NFTs currently owned by a specific account address, with metadata included.
      tags:
        - NFT API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arbitrum
            default: arbitrum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - accountAddress
                  properties:
                    accountAddress:
                      type: string
                      description: Parameter specifying the account address to query. Can be entered as a 40-character hexadecimal string starting with 0x.
                      pattern: ^0[xX][0-9a-fA-F]{40}$
                      example: "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
                    contractAddresses:
                      $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftContractMetadataByContracts/post/requestBody/content/application~1json/schema/properties/contractAddresses"
                - type: object
                  properties:
                    page:
                      type: integer
                      description: |-
                        The page parameter specifies the data page to query. It accepts values up to 100; for pages exceeding 100, use the cursor pagination method.

                        The page and cursor parameters cannot be used together. If both page and cursor are empty, cursor pagination is used.
                      pattern: ^(?:[1-9][0-9]?|100)$
                    rpp:
                      type: integer
                      description: rpp stands for results per page and specifies the page size. You can specify a number greater than 0 and up to 100.
                      pattern: ^(?:[1-9][0-9]{0,2}?|100)$
                    cursor:
                      type: string
                      description: |-
                        The cursor parameter supports pagination and data navigation between pages. Provide the cursor value from the previous page in the next request to load the next page of data.

                        The page and cursor parameters cannot be used together. If both page and cursor are empty, cursor pagination is used.
                    withCount:
                      type: boolean
                      description: Parameter specifying whether to include the count field in the response. The count field indicates the total number of requested data items. When set to true, the count field is included and response speed may be slower.
                      default: false
                - type: object
                  properties:
                    withMetadata:
                      type: boolean
                      description: Parameter specifying whether to include NFT token metadata fields (rawMetadata, metadataSyncedAt) in the response. Response speed may be slower when set to true.
                      default: false
            example:
              accountAddress: "0x742d35Cc6634C0532925a3b844Bc454e4438f44e"
              page: 1
              rpp: 10
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    required:
                      - items
                    properties:
                      page:
                        type: integer
                        description: Field representing the page number specified in the page parameter. This field is only included in the response when a value greater than 0 is specified for the page parameter.
                      rpp:
                        type: integer
                        description: Field representing the number of results per page specified in the rpp parameter.
                      cursor:
                        type: string
                        description: A field for cursor pagination. This value must be provided in the next request to load the next page of data.
                      count:
                        type: integer
                        description: Field representing the total count of requested data. This field is only included in the response when true is set for the withCount parameter.
                      items:
                        type: array
                        description: Field representing the list of queried data.
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - type: object
                              required:
                                - ownerAddress
                                - balance
                                - lastTransferredAt
                              properties:
                                ownerAddress:
                                  type: string
                                  description: A field representing the owner address.
                                balance:
                                  type: string
                                  description: A field representing the balance.
                                lastTransferredAt:
                                  type: string
                                  description: A field representing the time when the token or NFT was last transferred to the owner in ISO 8601 format. Only reflects transfers made via standard token Transfer events (ERC20, ERC721, ERC1155); transfers via non-standard events may not be reflected.
                            - type: object
                              required:
                                - tokenId
                                - tokenUri
                                - tokenUriSyncedAt
                              properties:
                                tokenId:
                                  type: string
                                  description: A field representing the unique ID of the NFT token. This ID is used to identify the NFT.
                                tokenUri:
                                  type: string
                                  description: A field representing the URI where the original metadata of the NFT is located. Format may vary by contract implementation, but is typically provided as an IPFS address or web URL.
                                tokenUriSyncedAt:
                                  type: string
                                  description: A field representing when the tokenUri of the NFT was synchronized.
                                rawMetadata:
                                  type: string
                                  description: A field representing the rawMetadata of the NFT. Included in the response only when the withMetadata parameter is set to true.
                                metadataSyncedAt:
                                  type: string
                                  description: A field representing when the metadata of the NFT was synchronized. Included in the response only when the withMetadata parameter is set to true.
                            - type: object
                              properties:
                                contract:
                                  allOf:
                                    - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftContractMetadataByContracts/post/responses/200/content/application~1json/schema/items/allOf/0"
                                    - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftContractMetadataByContracts/post/responses/200/content/application~1json/schema/items/allOf/1"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "408":
          $ref: "#/components/responses/408"
        "409":
          $ref: "#/components/responses/409"
        "413":
          $ref: "#/components/responses/413"
        "414":
          $ref: "#/components/responses/414"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
