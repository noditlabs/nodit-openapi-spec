            default: arbitrum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - contractAddress
                  properties:
                    contractAddress:
                      $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftHoldersByTokenId/post/requestBody/content/application~1json/schema/allOf/0/properties/contractAddress"
                - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/requestBody/content/application~1json/schema/allOf/1"
            example:
              contractAddress: "0xBC4CA0EdA7647A8aB7C2061c2E118A18a936f13D"
              page: 1
              rpp: 10
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftHoldersByTokenId/post/responses/200/content/application~1json/schema/allOf/1/properties/items/items"
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
          $ref: "#/components/responses/403"
        "404":
          $ref: "#/components/responses/404"
        "405":
          $ref: "#/components/responses/405"
        "408":
          $ref: "#/components/responses/408"
        "409":
          $ref: "#/components/responses/409"
        "413":
          $ref: "#/components/responses/413"
        "414":
          $ref: "#/components/responses/414"
        "429":
          $ref: "#/components/responses/429"
        "500":
          $ref: "#/components/responses/500"
        "503":
          $ref: "#/components/responses/503"
  /{chain}/{network}/nft/getNftHoldersByTokenId:
    post:
      security:
        - api_key: []
      operationId: arbitrum-getNftHoldersByTokenId
      summary: Get NFT Holders by Token ID
      description: |+
        Retrieves the holder list for a specific NFT. The holder list includes holder addresses and the quantity of NFTs held by each holder.

      x-seo-description: Retrieve all accounts currently holding a specific NFT identified by contract and token ID.
      tags:
        - NFT API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - arbitrum
            default: arbitrum
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - sepolia
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - contractAddress
                    - tokenId
                  properties:
                    contractAddress:
                      type: string
                      description: Parameter specifying the contract address to query. Can be entered as a 40-character hexadecimal string starting with 0x.
                      pattern: ^0[xX][0-9a-fA-F]{40}$
                    tokenId:
                      type: string
                      description: Parameter specifying the NFT token ID to query. Can be entered as a decimal string.
                      pattern: ^[0-9]+$
                - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/requestBody/content/application~1json/schema/allOf/1"
            example:
              contractAddress: "0xBC4CA0EdA7647A8aB7C2061c2E118A18a936f13D"
              tokenId: "1"
              page: 1
              rpp: 10
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1nft~1getNftsOwnedByAccount/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          required:
                            - ownerAddress
                            - totalBalance
                            - uniqueBalance
                          properties:
                            ownerAddress:
                              type: string
                              description: A field representing the owner address.
                            totalBalance:
                              type: string
                              description: |-
                                Returns the sum of all balance quantities for the contract.

                                 [Note]
                                 The quantity calculation method may vary depending on the contract type. For ERC721, it equals uniqueBalance; for ERC1155, it returns the sum of all quantities.

                                 (Example)
                                 ERC721: Returns 3 if holding #100, #200, #300
                                 ERC1155: Returns 600 if holding 100 of #1, 200 each of #200 and #300
                            uniqueBalance:
                              type: string
                              description: |-
                                Returns the number of distinct token IDs among the NFTs held by the contract.

                                 [Note]
                                 The quantity calculation method may vary depending on the contract type. For ERC721, it equals totalBalance; for ERC1155, it returns the number of unique token IDs.

                                 (Example)
                                 ERC721: Returns 3 if holding #100, #200, #300
                                 ERC1155: Returns 3 if holding 100 of #1, 200 each of #200 and #300
        "400":
          $ref: "#/components/responses/400"
        "401":
          $ref: "#/components/responses/401"
        "403":
