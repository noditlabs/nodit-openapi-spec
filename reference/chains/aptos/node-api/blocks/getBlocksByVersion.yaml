        - type
        - version
        - hash
        - state_change_hash
        - event_root_hash
        - gas_used
        - success
        - vm_status
        - accumulator_root_hash
        - changes
        - events
        - timestamp
        - quorum_certified_update
      properties:
        type:
          type: string
          description: The type of the transaction
          enum:
            - validator_transaction
        version:
          $ref: "#/components/schemas/Version"
        hash:
          type: string
          description: |
            A field representing the hash of the transaction, provided as a 64-character hexadecimal string starting with 0x.
        state_change_hash:
          type: string
          description: |
            A field representing the state change hash of the transaction, provided as a 64-character hexadecimal string starting with 0x.
        event_root_hash:
          type: string
          description: |
            A field representing the event root hash of the transaction, provided as a 64-character hexadecimal string starting with 0x.
        state_checkpoint_hash:
          type: string
          description: |
            A field representing the state checkpoint hash of the transaction, provided as a 64-character hexadecimal string starting with 0x.
        gas_used:
          type: string
          description: |
            A field representing the amount of gas used in the transaction, used to calculate the execution cost of the transaction.
        success:
          type: boolean
          description: |
            A field indicating whether the transaction succeeded; true means the transaction executed successfully, false means an error occurred during execution.
        vm_status:
          type: string
          description: |
            A field representing the VM status of the transaction, used to represent the execution result. Helps analyze the cause of transaction failures and troubleshoot issues.
        accumulator_root_hash:
          type: string
          description: |
            A field representing the root hash of the accumulated transaction state, provided as a 64-character hexadecimal string starting with 0x.
        changes:
          type: array
          description: |
            A field representing the changes made by the transaction, used to represent the execution result.
          items:
            oneOf:
              - $ref: "#/components/schemas/DeleteModule"
              - $ref: "#/components/schemas/DeleteResource"
              - $ref: "#/components/schemas/DeleteTableItem"
              - $ref: "#/components/schemas/WriteModule"
              - $ref: "#/components/schemas/WriteResource"
              - $ref: "#/components/schemas/WriteTableItem"
        events:
          type: array
          description: |
            A field representing the events of the transaction.
          items:
            $ref: "#/components/schemas/Event"
        timestamp:
          type: string
          description: |
            A field representing the timestamp of the transaction, used to indicate when the transaction occurred.
        quorum_certified_update:
          type: object
          description: |
            A field representing the quorum certified update of the transaction.
          required:
            - update
            - multi_sig
          properties:
            update:
              type: object
              description: |
                An API-friendly representation of the on-chain aptos_types::jwks::ProviderJWKs object.
              required:
                - issuer
                - version
                - jwks
              properties:
                issuer:
                  type: string
                version:
                  type: string
                jwks:
                  type: array
                  items:
                    type: object
            multi_sig:
              type: object
              description: |
                An API-friendly representation of the on-chain aptos_types::aggregate_signature::AggregateSignature.
              required:
                - signer_indices
                - sig
              properties:
                signer_indices:
                  type: array
                  items:
                    type: integer
                sig:
                  $ref: "#/components/schemas/Bytecode"
    Version:
      type: string
      description: |
        A unique sequence ID representing the transaction version, starting from 0 and incrementing sequentially.
        Transaction version is used to guarantee transaction execution order and to query the state of a specific transaction.
      example: "3679250756"
    WriteModule:
      type: object
      title: Write Module
      description: |
        Represents a change for writing a Move module.
      required:
        - type
        - address
        - state_key_hash
        - data
      properties:
        type:
          type: string
          description: The type of the change
          enum:
            - write_module
          example: write_module
        address:
          $ref: "#/components/schemas/Address"
        state_key_hash:
          type: string
          description: The hash value of the state key.
        data:
          $ref: "#/components/schemas/Module"
    WriteResource:
      type: object
      title: Write Resource
      description: |
        Represents a change for writing a resource.
      required:
        - type
        - address
        - state_key_hash
        - data
      properties:
        type:
          type: string
          description: The type of the change
          enum:
            - write_resource
          example: write_resource
        address:
          $ref: "#/components/schemas/Address"
        state_key_hash:
          type: string
          description: The hash value of the state key.
        data:
          type: object
          description: The parsed Move resource.
          required:
            - type
            - data
          properties:
            type:
              $ref: "#/components/schemas/ResourceType"
            data:
              $ref: "#/components/schemas/ResourceData"
    WriteSetPayload:
      type: object
      description: |
        Represents the write set payload used only in genesis transactions.
      required:
        - type
        - write_set
      properties:
        type:
          type: string
          description: The type of the payload
          enum:
            - write_set_payload
        write_set:
          type: object
          oneOf:
            - $ref: "#/components/schemas/DirectWriteSet"
            - $ref: "#/components/schemas/ScriptWriteSet"
    WriteTableItem:
      type: object
      title: Write Table Item
      description: |
        Represents a change for writing a table item.
      required:
        - type
        - state_key_hash
        - handle
        - key
        - value
        - data
      properties:
        type:
          type: string
          description: The type of the change
          enum:
            - write_table_item
          example: write_table_item
        state_key_hash:
          type: string
          description: The hash value of the state key.
        handle:
          $ref: "#/components/schemas/Bytecode"
        key:
          $ref: "#/components/schemas/Bytecode"
        value:
          $ref: "#/components/schemas/Bytecode"
        data:
          type: object
          required:
            - key
            - key_type
            - value
            - value_type
          properties:
            key:
              $ref: "#/components/schemas/Any"
            key_type:
              type: string
            value:
              $ref: "#/components/schemas/Any"
            value_type:
              type: string
  responses:
    "400":
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AptosError"
            example:
              message: "Failed to read raw transactions from storage: AptosDB Other Error: Transaction at version 3 is pruned, min available version is 3133900526."
              error_code: internal_error
              vm_error_code: null
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NoditError"
            example:
              code: AUTHENTICATION_FAILED
              message: Authentication failed
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NoditError"
            example:
              code: PERMISSION_DENIED
              message: Permission denied
    "404":
      description: Not Found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NoditError"
            example:
              code: RESOURCE_NOT_FOUND
              message: "Resource not found: { RESOURCE1_NAME = RESOURCE1_VALUE, RESOURCE2_NAME = RESOURCE2_VALUE, ... }"
    "410":
      description: Block Pruned
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AptosError"
            example:
              message: Block(160155267) has been pruned
              error_code: block_pruned
              vm_error_code: null
    "429":
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/NoditError"
            example:
              code: TOO_MANY_REQUESTS
              message: Too many requests
paths:
  /blocks/by_version/{version}:
    get:
      security:
        - api_key: []
      operationId: aptos-getBlocksByVersion
      summary: Get blocks by version
      description: |
        This endpoint allows you to query transactions and block information for a specific block.

        Transactions are limited by the default maximum transaction count. If not all transactions are returned, you must query the remaining transactions separately using the get transactions API. A 410 status code is returned if the block has been pruned.
      x-seo-description: Retrieve block data containing a specific transaction version on the Aptos blockchain.
      tags:
        - Blocks
      parameters:
        - $ref: "#/components/parameters/Version"
        - $ref: "#/components/parameters/WithTransactions"
      responses:
        "200":
          description: Successful Response
          headers:
            X-APTOS-BLOCK-HEIGHT:
              description: Current block height of the chain
              schema:
                type: integer
              required: true
            X-APTOS-CHAIN-ID:
              description: Chain ID of the current chain
              schema:
                type: integer
              required: true
            X-APTOS-EPOCH:
              description: Current epoch of the chain
              schema:
                type: integer
              required: true
            X-APTOS-LEDGER-OLDEST-VERSION:
              description: Oldest unpruned ledger version of the chain
              schema:
                type: integer
              required: true
            X-APTOS-LEDGER-TIMESTAMPUSEC:
              description: Current timestamp of the chain
              schema:
                type: integer
              required: true
            X-APTOS-LEDGER-VERSION:
              description: Current ledger version of the chain
              schema:
                type: integer
              required: true
            X-APTOS-OLDEST-BLOCK-HEIGHT:
              description: Oldest unpruned block height of the chain
              schema:
                type: integer
              required: true
            X-APTOS-CURSOR:
              description: Cursor for the next page
              schema:
                type: string
            X-APTOS-GAS-USED:
              description: Amount of gas actually used for transaction execution
              schema:
                type: integer
