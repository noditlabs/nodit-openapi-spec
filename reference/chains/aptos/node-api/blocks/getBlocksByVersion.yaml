        event_root_hash:
          type: string
          description: |
            A field representing the event root hash of the transaction.
        state_checkpoint_hash:
          type: string
          description: |
            A field representing the state checkpoint hash of the transaction.
        gas_used:
          type: string
          description: |
            A field representing the amount of gas used in the transaction, used to calculate the execution cost of the transaction.
        success:
          type: boolean
          description: |
            A field indicating whether the transaction succeeded; true means the transaction executed successfully, false means an error occurred during execution.
        vm_status:
          type: string
          description: |
            A field representing the VM status of the transaction, used to represent the execution result. Helps analyze the cause of transaction failures and troubleshoot issues.
        accumulator_root_hash:
          type: string
          description: |
            A field representing the root hash of the accumulated transaction state.
        changes:
          type: array
          description: |
            A field representing the changes made by the transaction, used to represent the execution result.
          items:
            oneOf:
              - $ref: "#/components/schemas/DeleteModule"
              - $ref: "#/components/schemas/DeleteResource"
              - $ref: "#/components/schemas/DeleteTableItem"
              - $ref: "#/components/schemas/WriteModule"
              - $ref: "#/components/schemas/WriteResource"
              - $ref: "#/components/schemas/WriteTableItem"
        sender:
          $ref: "#/components/schemas/Sender"
        sequence_number:
          $ref: "#/components/schemas/SequenceNumber"
        max_gas_amount:
          $ref: "#/components/schemas/MaxGasAmount"
        gas_unit_price:
          $ref: "#/components/schemas/GasUnitPrice"
        expiration_timestamp_secs:
          $ref: "#/components/schemas/ExpirationTimestampSecs"
        payload:
          oneOf:
            - $ref: "#/components/schemas/EntryFunctionPayload"
            - $ref: "#/components/schemas/ScriptPayload"
            - $ref: "#/components/schemas/ModuleBundlePayload"
            - $ref: "#/components/schemas/MultisigPayload"
        signature:
          oneOf:
            - $ref: "#/components/schemas/Ed25519Signature"
            - $ref: "#/components/schemas/MultiEd25519Signature"
            - $ref: "#/components/schemas/MultiAgentSignature"
            - $ref: "#/components/schemas/FeePayerSignature"
            - $ref: "#/components/schemas/AccountSignature"
            - $ref: "#/components/schemas/NoAccountSignature"
        replay_protection_nonce:
          $ref: "#/components/schemas/ReplayProtectionNonce"
        events:
          type: array
          description: A field representing the events of the transaction.
          items:
            $ref: "#/components/schemas/Event"
        timestamp:
          type: string
