  /{chain}/{network}/webhooks/history:
    get:
      security:
        - api_key: []
      operationId: aptos-getWebhookHistory
      summary: Get Webhook History
      description: |-
        API for querying Webhook call history. Use this API to check Webhook execution status and call results. Call history includes Webhook event success/failure status and detailed information for each call.

        > 💡 History data retention period
        > Only Webhook call history from the last 30 days is stored. Data older than 30 days is not retained, so you must query needed history within that period.
      x-seo-description: Retrieve the delivery history of a webhook subscription, including event logs and response statuses.
      tags:
        - Webhook API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - aptos
            default: aptos
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
              - testnet
            default: mainnet
          description: Parameter to specify the network of the target chain. Supported networks may vary depending on the chain.
        - name: subscriptionId
          in: query
          required: true
          schema:
            type: string
            example: "5001"
          description: Parameter that specifies the subscriptionId assigned to the Webhook to query. Use the subscriptionId returned when creating the Webhook to query, update, or delete Webhook information. Enter an empty value to query all Webhook information.
        - name: page
          in: query
          required: false
          schema:
            type: string
            example: 1
          description: Specifies the page to query. Default is 1.
        - name: rpp
          in: query
          required: false
          schema:
            type: string
            example: "10"
          description: Specifies the number of events to query per page. Value range is 1 to 100. Default is 10.
        - name: withEventMessage
          in: query
          required: false
          schema:
            type: boolean
            example: true
          description: Specifies whether to include event messages in the query. Default is false.
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - SUCCESS
              - FAIL
            example: SUCCESS
          description: Filters events by webhook call success (SUCCESS) or failure (FAIL).
        - name: startAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-01-01T00:00:00Z"
          description: Specifies the start time for event occurrence in ISO 8601 format.
        - name: endAt
          in: query
          required: false
          schema:
            type: string
            format: date-time
            example: "2026-01-01T00:00:00Z"
          description: Specifies the end time for event occurrence in ISO 8601 format.
        - name: startSequenceNumber
          in: query
          required: false
          schema:
            type: string
            example: "100"
          description: Specifies the sequenceNumber to start the query from.
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: number
                    description: Total number of events matching the criteria.
                  page:
                    type: number
                    description: Current page number of the query.
                  rpp:
                    type: number
                    description: Number of events per page returned based on the request.
                  items:
                    type: array
                    description: Array containing event detail data.
                    items:
                      type: object
                      properties:
                        subscriptionId:
                          type: string
                          description: Field representing the subscriptionId assigned to the Webhook. subscriptionId is a unique value that identifies the Webhook and is used to query, update, or delete the Webhook.
                        description:
                          type: string
                          description: Field representing the Webhook description.
                        protocol:
                          type: string
                          description: Field representing the chain subscribed to via this Webhook. (e.g., ETHEREUM, POLYGON, OPTIMISM, ...)
                        network:
                          type: string
                          description: Field representing the network subscribed to via this Webhook. (e.g., MAINNET, SEPOLIA, MUMBAI, ...)
                        subscriptionType:
                          type: string
                          description: Field for identifying the subscription type.
                          example: WEBHOOK
                        eventType:
                          type: string
                          description: Field representing the event type subscribed to by this Webhook.
                        notification:
                          type: object
                          required:
                            - webhookUrl
                          description: Field representing the information for receiving notifications via Webhook.
                          properties:
                            webhookUrl:
                              type: string
                              description: Field representing the URL for receiving Webhook notifications.
                        isActive:
                          type: boolean
                          description: Field representing whether the Webhook is active. true when the Webhook is enabled, false when disabled. When disabled, you cannot receive notifications via the Webhook.
                        updatedAt:
                          type: string
                          description: Indicates when there was a change in the webhook delivery result (status), e.g., when a failed delivery was retried and changed to success. This field is returned in ISO 8601 format.
                        createdAt:
                          type: string
                          description: Indicates when the webhook event occurred and the log was created. This field is returned in ISO 8601 format.
                        condition:
                          type: object
                          description: Field representing the Webhook subscription conditions. Conditions may vary by event type.
              example:
                total: 146779
                rpp: 2
                page: 1
                items:
                  - id: "1596"
                    subscriptionId: "103524"
                    sequenceNumber: "20"
                    status: FAIL
                    updatedAt: "2024-12-13T02:06:09.000Z"
