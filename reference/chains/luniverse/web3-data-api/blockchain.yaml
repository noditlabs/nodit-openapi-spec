  /{chain}/{network}/blockchain/getTransactionsInBlock:
    post:
      security:
        - api_key: []
      operationId: luniverse-getTransactionsInBlock
      summary: Get Transactions In Block
      description: |+
        Retrieves the list of transactions within a specific block.


        > 🚧 Caution when using decodeInput
        >
        > The decodeInput field decodes the transaction's input field and provides the result. However, different functions can use the same function selector, so the provided result may not match the actually called function. Therefore, additional verification is recommended for functions that differ from ERC standard specifications.

      x-seo-description: Retrieve all transactions included in a specific block, identified by hash or block number.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - luniverse
            default: luniverse
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - block
                  properties:
                    block:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getBlockByHashOrNumber/post/requestBody/content/application~1json/schema/properties/block"
                - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/requestBody/content/application~1json/schema/allOf/1"
                - type: object
                  properties:
                    withLogs:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/withLogs"
                    withDecode:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/withDecode"
            example:
              block: "17530000"
              withLogs: false
              withDecode: false
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/responses/200/content/application~1json/schema/allOf/0"
                  - type: object
                    properties:
                      items:
                        type: array
                        items:
                          allOf:
                            - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/responses/200/content/application~1json/schema"
                            - type: object
                              properties:
                                logs:
                                  type: array
                                  items:
                                    type: object
                                    required:
                                      - contractAddress
                                      - transactionHash
                                      - transactionIndex
                                      - blockHash
                                      - blockNumber
                                      - data
                                      - logIndex
                                      - removed
                                      - topics
                                    properties:
                                      contractAddress:
                                        type: string
                                        description: A field representing the contract address that generated the log. Provided as a 40-character hexadecimal string prefixed with 0x.
                                      transactionHash:
                                        type: string
                                        description: A field representing the hash of the transaction that generated the log. Provided as a 64-character hexadecimal string prefixed with 0x.
                                      transactionIndex:
                                        type: integer
                                        description: A field representing the index of the transaction that generated the log. Indicates the order within the block. Provided in decimal string format.
                                      blockHash:
                                        type: string
                                        description: A field representing the hash of the block that generated the log. Provided as a 64-character hexadecimal string prefixed with 0x.
                                      blockNumber:
                                        type: integer
                                        description: A field representing the block number that generated the log.
                                      data:
                                        type: string
                                        description: A field representing the data of the log. Provided as a hexadecimal string prefixed with 0x. This field represents the event data of the log.
                                      logIndex:
                                        type: integer
                                        description: A field representing the index of the log. Indicates the order of events in the transaction. Provided in decimal string format.
                                      removed:
                                        type: boolean
                                        description: A field indicating whether the log was removed. Returns true if the log was removed due to chain reorganization (Reorg).
                                      topics:
                                        type: array
                                        description: A field representing the indexed arguments of the log. Can have up to 4 topics.
                                        items:
                                          type: string
                                          description: A field representing a topic of the log. Provided as a 64-character hexadecimal string prefixed with 0x.
                                      decodedLog:
                                        type: object
                                        description: A field representing the event data of the log. Included in the response only when the withDecode parameter is set to true.
                                        required:
                                          - name
                                          - eventFragment
                                          - signature
                                          - eventHash
                                          - args
                                        properties:
                                          name:
                                            type: string
                                            description: A field representing the event name of the log.
                                          eventFragment:
                                            type: string
                                            description: A field representing the event fragment of the log.
                                          signature:
                                            type: string
                                            description: A field representing the event signature of the log.
                                          eventHash:
                                            type: string
                                            description: A field representing the event hash of the log.
                                          args:
                                            type: array
                                            description: A field representing the arguments of the log.
                                            items:
                                              type: object
                                              properties:
                                                name:
                                                  type: string
                                                  description: A field representing the name of the argument.
                                                type:
                                                  type: string
                                                  description: A field representing the type of the argument.
                                                value:
