  /{chain}/{network}/blockchain/getTransactionsByAccount:
    post:
      security:
        - api_key: []
      operationId: luniverse-getTransactionsByAccount
      summary: Get Transactions By Account
      description: |
        Retrieves the list of transactions sent or received by a specific account.
      x-seo-description: Get a paginated list of all transactions associated with a specific account address.
      tags:
        - Blockchain API
      parameters:
        - name: chain
          in: path
          required: true
          schema:
            type: string
            enum:
              - luniverse
            default: luniverse
          description: Parameter to specify the target chain for the query.
        - name: network
          in: path
          required: true
          schema:
            type: string
            enum:
              - mainnet
            default: mainnet
          description: Parameter to specify the network of the target chain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - type: object
                  required:
                    - accountAddress
                  properties:
                    accountAddress:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getNextNonceByAccount/post/requestBody/content/application~1json/schema/properties/accountAddress"
                    relation:
                      type: string
                      description: |-
                        Parameter for filtering transactions where the queried account address is the sender or recipient.
                        - from: Filter by sender only.
                        - to: Filter by recipient only.
                        - both (default): Returns all transactions where the queried address appears in from or to.
                      enum:
                        - from
                        - to
                        - both
                      pattern: from|to|both
                      default: both
                    fromBlock:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/requestBody/content/application~1json/schema/allOf/0/properties/fromBlock"
                    toBlock:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/requestBody/content/application~1json/schema/allOf/0/properties/toBlock"
                    fromDate:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/requestBody/content/application~1json/schema/allOf/0/properties/fromDate"
                    toDate:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/requestBody/content/application~1json/schema/allOf/0/properties/toDate"
                - $ref: "#/paths/~1{chain}~1{network}~1blockchain~1searchEvents/post/requestBody/content/application~1json/schema/allOf/1"
                - type: object
                  properties:
                    withLogs:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/withLogs"
                    withDecode:
                      $ref: "#/paths/~1{chain}~1{network}~1blockchain~1getTransactionByHash/post/requestBody/content/application~1json/schema/properties/withDecode"
            example:
              accountAddress: "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045"
              relation: both
              fromDate: "2026-01-01T00:00:00Z"
              toDate: "2026-02-01T00:00:00Z"
